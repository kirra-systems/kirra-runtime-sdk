apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-verifier
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Release.Name }}-verifier
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-verifier
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.verifier.port }}
          env:
            - name: KIRRA_VERIFIER_MODE
              value: {{ .Values.verifier.mode | quote }}
            - name: KIRRA_DB_PATH
              value: {{ .Values.verifier.dbPath | quote }}
            - name: RUST_LOG
              value: {{ .Values.verifier.logLevel | quote }}
            - name: KIRRA_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.admin.existingSecret }}{{ .Values.admin.existingSecret }}{{ else }}{{ .Release.Name }}-admin-token{{ end }}
                  key: admin-token
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: storage-volume
              mountPath: /data
      volumes:
        - name: storage-volume
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-sqlite-pvc
          {{- else }}
          emptyDir: {}
          {{- end }}
