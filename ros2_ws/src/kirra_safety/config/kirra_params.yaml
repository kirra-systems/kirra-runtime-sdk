cmd_vel_interceptor:
  ros__parameters:
    kirra_url: "http://localhost:8090"
    kirra_token: ""              # Set via environment variable KIRRA_ADMIN_TOKEN or launch arg
    kirra_client_id: "ros2-interceptor-01"
    wheelbase_m: 0.2             # Hiwonder ROSOrin wheelbase (meters)
    max_speed_mps: 1.8           # ROSOrin spec max speed (m/s)
    input_topic: "/cmd_vel"
    output_topic: "/cmd_vel_safe"
    enforcement_topic: "/kirra/enforcement_action"
    posture_topic: "/kirra/fleet_posture"
    timeout_ms: 50               # Kirra API timeout (ms) -- fail-closed on timeout
    fallback_on_timeout: "stop"  # "stop" (fail-closed) or "passthrough" (degraded mode)
    use_perception_cap: false    # opt-in: apply Taj's assured-clear-distance cap before the governor
    perception_cap_topic: "/kirra/perception_speed_cap"
    perception_cap_stale_ms: 300 # cap older than this is a perception fault -> fail-closed stop
    release_topic: "/kirra/release"  # ADR-0033 relay: verifier-minted signed frames -> motor consumer

occy_doer:
  ros__parameters:
    # REQUIRED (the node refuses to start without it): newest-scan staleness
    # budget in seconds -- perception older than this and the doer HOLDS
    # instead of proposing motion. 0.25 s = 2.5 scan periods of the
    # bench-verified TG30 at ~10 Hz (HARDWARE_FINDINGS_R2X3.md deployment);
    # a different lidar rate needs a deployment-review update here.
    scan_stale_s: 0.25

    # --- R2-SIZED footprint + clearance (doer-side; sent to the planner's
    # CHECKER each tick). WITHOUT these the node falls back to occy_doer.py's
    # courier-sized defaults (half 0.15/0.18, clearance 0.6/0.6) and judges a
    # ~0.2 m robot as if it needed a courier's lane -> the corridor pinches
    # shut and KIRRA MRCs even passable gaps. Setting the robot's REAL size is
    # accurate modelling, NOT a safety relaxation.
    #
    # NOTE the two distinct "space" surfaces (docs/CONTRACT_PROFILES.md):
    #   * footprint (half_*): the robot's BODY. Keep it >= the real robot --
    #     these are CONSERVATIVE estimates pending a tape-measure (see
    #     R2_PATH_B / PLATFORM_R2_PENDING). NEVER shrink below reality.
    #   * clearance TARGETS (lateral_clearance_target_m /
    #     rss_lateral_alignment_tolerance_m): extra room DEMANDED beyond the
    #     body. A 0.2 m robot honestly needs far less than an AV's 0.6 m.
    # This is the doer dry-run envelope only; the ACTUATION envelope (Stage 2)
    # is the verifier's per-class contract (courier interim until a measured
    # `r2` class lands).
    vehicle_class: "courier"                    # doer RSS-band label; numbers below win
    wheelbase_m: 0.229                          # R2 physical wheelbase (matches KIRRA_R2_WHEELBASE_M)
    half_length_m: 0.16                         # CONSERVATIVE (~0.30 m body); tape-measure to firm up
    half_width_m: 0.12                          # CONSERVATIVE (~0.20 m body); tape-measure to firm up
    lateral_clearance_target_m: 0.15            # robot-scale (was courier 0.6)
    rss_lateral_alignment_tolerance_m: 0.15     # robot-scale (was courier 0.6)

perception_governor:
  ros__parameters:
    taj_url: "http://localhost:8101"   # the Taj perception sidecar (kirra-mick example taj_service)
    scan_topic: "/scan"
    cap_topic: "/kirra/perception_speed_cap"
    health_topic: "/kirra/perception_health"
    timeout_ms: 40
    forward_extent_m: 8.0        # Taj geometric horizon (m)
    decel_mps2: 1.5              # assumed comfortable brake for the ACD cap
    margin_m: 0.4                # standoff distance (matches the checker's lateral margin)
    lane_half_m: 0.6             # in-lane half-width for object gating (m)
    confidence_floor: 0.5        # corridor confidence below this -> unhealthy -> 0.0 cap

sensor_monitor:
  ros__parameters:
    kirra_url: "http://localhost:8090"
    kirra_token: ""
    kirra_client_id: "ros2-sensor-monitor-01"
    report_interval_ms: 200      # How often to post health reports (ms)
    lidar_min_hz: 5.0            # Minimum acceptable LiDAR rate (Hz)
    imu_covariance_threshold: 0.1
    odometry_stale_ms: 500       # Odometry stale threshold (ms)

posture_subscriber:
  ros__parameters:
    kirra_url: "http://localhost:8090"
    kirra_token: ""
    kirra_client_id: "ros2-posture-bridge-01"
    cmd_vel_safe_topic: "/cmd_vel_safe"
