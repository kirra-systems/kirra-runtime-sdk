{{- if not .Values.kirra.existingSecret -}}
{{- if .Values.kirra.adminToken -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kirra.fullname" . }}
  labels:
    {{- include "kirra.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-token: {{ .Values.kirra.adminToken | quote }}
{{- else }}
{{- fail "kirra.adminToken is required unless kirra.existingSecret is set" }}
{{- end }}
{{- end }}
