apiVersion: v1
kind: Service
metadata:
  name: {{ include "kirra.fullname" . }}
  labels:
    {{- include "kirra.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.dashboard.enabled }}
    - port: {{ .Values.dashboard.service.port }}
      targetPort: dashboard
      protocol: TCP
      name: dashboard
    {{- end }}
  selector:
    {{- include "kirra.selectorLabels" . | nindent 4 }}
