# cargo-mutants configuration (WP-08 / MGA G-6 — mutation-testing gate).
#
# SCOPE. Mutation runs target the CHECKER crate (`-p kirra-trajectory`,
# passed on the command line by the CI lane / the baseline scripts), and the
# test scope below ALWAYS includes the ros2-adapter's validation suite: the
# checker's deepest tests live in `crates/kirra-ros2-adapter/tests/
# validation_tests.rs` (the Option-B re-export wiring), so running only the
# mutated package's own tests understates kill rates badly — measured on the
# 2026-07-07 baseline: 318 survivors with own-tests-only vs 202 with the
# adapter suite included (see docs/testing/MUTATION_BASELINE.md).
additional_cargo_test_args = [
    "--package", "kirra-trajectory",
    "--package", "kirra-ros2-adapter",
]

# Generous per-mutant timeout: some mutations turn bounded loops degenerate;
# the suite itself runs in seconds, so 300 s cleanly separates "hung mutant"
# (caught as timeout) from slow CI I/O.
minimum_test_timeout = 300
