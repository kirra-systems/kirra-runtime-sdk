# deny.toml — cargo-deny supply-chain policy (WS-0.6).
#
# Enforced in CI by the `supply-chain` job (.github/workflows/ci.yml) over
# BOTH workspaces: the root workspace and `parko/` (its own lockfile).
# `parko/deny.toml` is a SYMLINK to this file, so config discovery resolves
# both workspaces to this single policy and they cannot drift.
#
# Checks gated red (deterministic — they change only when the dependency
# tree changes):
#   - licenses: every third-party crate must carry an allowlisted license.
#   - bans:     wildcard version requirements are denied; duplicate crate
#               versions warn (visible, not red — the tree has benign dupes).
#   - sources:  crates.io ONLY. No git dependencies, no alternate
#               registries (both lockfiles are 100% crates.io today; this
#               pins that property).
#
# `advisories` runs as a separate GATING CI step over both workspaces
# (WP-04 / MGA G-6): a new RUSTSEC advisory reds the PR until the dependency
# is bumped or the advisory is triaged into `[advisories].ignore` below with
# a written reason + removal condition. An advisory firing on an unrelated
# PR is by design — someone triages it (bump or scoped ignore entry), and
# every PR after that is green again; the previous non-gating mode let every
# advisory pass unseen instead.

[graph]
# Resolve the FULL feature graph (#797 F3 / #775): the `ros2` (r2r + ROS
# message chain) and `tpm` (tss-esapi + bindgen chain) trees are built and
# shipped by CI, so they must be license/ban/source/advisory-checked like
# everything else — feature-gated is not exempt. Resolution is metadata-only
# (from the committed lockfiles); no ROS/TPM system libraries are needed.
# What STAYS outside this policy graph: the workspace-DETACHED harness trees
# (fuzz/, verification/kani, kirra-loom-models, kirra-verifier-pg,
# tools/iceoryx2-spike) with their own lockfiles, and native SDKs linked on
# hardware at build time (TensorRT) that are not crates.io dependencies.
all-features = true
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-gnu",
    "aarch64-unknown-linux-musl",
    "armv7-unknown-linux-musleabihf",
]

[licenses]
# The workspace's own crates are proprietary (COPYRIGHT, publish = false);
# they are not third-party supply chain and are excluded from the license
# check. Everything that CAN reach a shipped artifact must match this
# allowlist — permissive licenses only, no copyleft surprises in a
# proprietary product.
private = { ignore = true }
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "BSL-1.0",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    # Apache-2.0 with the LLVM binary-embedding exception — strictly MORE
    # permissive than plain Apache-2.0 (the exception only removes the §4
    # notice burden when embedding in binaries). Enters the full-feature
    # graph via target-lexicon (tss-esapi-sys/bindgen build chain, #797 F3).
    "Apache-2.0 WITH LLVM-exception",
]
confidence-threshold = 0.8

[bans]
# Duplicate versions are visible but not red: the tree carries benign
# dupes (transitive semver splits) and going red on every new one would
# make the gate noise. Wildcard requirements ARE red — a `*` requirement
# is an unbounded trust grant.
multiple-versions = "warn"
wildcards = "deny"
# Workspace members reference each other by version-less PATH deps (both
# workspaces are private, publish = false); those are not registry wildcards
# and are exempted explicitly — a `*` on a REGISTRY dependency stays red.
allow-wildcard-paths = true

[sources]
# crates.io only — a git or alternate-registry dependency bypasses the
# registry's immutability and yanking guarantees and must be an explicit,
# reviewed policy change here.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[advisories]
# Consumed by the GATING CI advisories steps (see header). db-path/db-urls
# default. Each ignore entry carries its justification and removal
# condition — re-audit on every release.
version = 2
yanked = "warn"
ignore = [
    # rustls-pemfile is unmaintained (its PEM parsing moved into
    # rustls-pki-types::pem); no drop-in upgrade exists. It parses
    # OPERATOR-SUPPLIED PEM files (TLS cert/key loading), not
    # attacker-controlled wire input, and the advisory is unmaintained-class
    # only (no known vulnerability). Remove when the dependents migrate to
    # rustls-pki-types PemObject (track reqwest/rustls bumps).
    { id = "RUSTSEC-2025-0134", reason = "unmaintained; no drop-in upgrade; parses operator-supplied PEM only" },
    # paste is unmaintained (advisory is unmaintained-class only, no known
    # vulnerability). It is a COMPILE-TIME proc-macro (token pasting) with
    # zero runtime footprint, pinned by the r2r 0.9.5 ROS bindings chain —
    # surfaced only now that the policy graph covers the ros2 feature tree
    # (#797 F3). Not bumpable from this repo. Remove when r2r moves off
    # paste (track r2r releases > 0.9.5).
    { id = "RUSTSEC-2024-0436", reason = "unmaintained; compile-time-only proc-macro; pinned by r2r 0.9.5; remove on r2r upgrade" },
]
