[package]
name = "aegis-runtime-sdk"
version = "0.9.5"
edition = "2021"

[lib]
name = "aegis_runtime_sdk"
crate-type = ["rlib", "cdylib"]

[features]
ros2 = []
tpm = ["dep:tss-esapi"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"
dashmap = "6"
axum = "0.8"
tokio = { version = "1", features = ["full"] }
tss-esapi = { version = "7", optional = true }
rusqlite = { version = "0.31", features = ["bundled"] }
tower = { version = "0.5", features = ["util"] }
http = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }
ed25519-dalek = { version = "2", features = ["rand_core"] }
base64 = "0.22"
tokio-stream = { version = "0.1", features = ["sync"] }

[dev-dependencies]
rand = "0.8"

[[bin]]
name = "ai_robot_demo"
path = "src/bin/ai_robot_demo.rs"

[[bin]]
name = "ai_robot_sim_diagnostic"
path = "src/bin/ai_robot_sim_diagnostic.rs"

[[bin]]
name = "aegis_ros2_demo_node"
path = "src/bin/aegis_ros2_demo_node.rs"

[[bin]]
name = "aegis_ros2_publisher"
path = "src/bin/aegis_ros2_publisher.rs"
required-features = ["ros2"]

[[bin]]
name = "aegis_verifier_service"
path = "src/bin/aegis_verifier_service.rs"

