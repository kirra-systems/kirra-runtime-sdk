<svg width="512" height="512" viewBox="130 115 260 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kirra">
  <!-- Glow filter (cyan halo) — composited over the crisp graphic -->
  <defs>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix
        in="blur"
        type="matrix"
        values="0 0 0 0 0.2
                0 0 0 0 0.9
                0 0 0 0 1
                0 0 0 0.7 0"
        result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- K monogram group -->
  <g filter="url(#softGlow)" stroke="#34f5a6" fill="#34f5a6" stroke-width="2">

    <!-- Nodes (circles) -->
    <!-- Vertical spine -->
    <circle cx="200" cy="140" r="5"/>
    <circle cx="200" cy="210" r="5"/>
    <circle cx="200" cy="280" r="5"/>
    <circle cx="200" cy="350" r="5"/>

    <!-- Upper diagonal -->
    <circle cx="260" cy="190" r="5"/>
    <circle cx="320" cy="150" r="5"/>

    <!-- Lower diagonal -->
    <circle cx="260" cy="270" r="5"/>
    <circle cx="320" cy="330" r="5"/>

    <!-- Bright central node -->
    <circle cx="230" cy="240" r="6" fill="#34f5a6"/>

    <!-- Edges (lines) -->
    <!-- Vertical spine connections -->
    <line x1="200" y1="140" x2="200" y2="210"/>
    <line x1="200" y1="210" x2="200" y2="280"/>
    <line x1="200" y1="280" x2="200" y2="350"/>

    <!-- Spine to bright node -->
    <line x1="200" y1="210" x2="230" y2="240"/>
    <line x1="200" y1="280" x2="230" y2="240"/>

    <!-- Bright node to upper diagonal -->
    <line x1="230" y1="240" x2="260" y2="190"/>
    <line x1="260" y1="190" x2="320" y2="150"/>

    <!-- Bright node to lower diagonal -->
    <line x1="230" y1="240" x2="260" y2="270"/>
    <line x1="260" y1="270" x2="320" y2="330"/>

  </g>
</svg>
