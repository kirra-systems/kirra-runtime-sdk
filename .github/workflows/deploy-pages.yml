name: Deploy website to GitHub Pages

# Publishes the static site in website/ to GitHub Pages on every push to main
# that touches the site (or on manual dispatch).

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'scripts/fetch-substack-posts.mjs'
      - '.github/workflows/deploy-pages.yml'
  # Daily rebuild so the Field Notes feed picks up new Substack posts.
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Enables Pages (build type = GitHub Actions) if not already enabled.
      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      # Bake the latest Substack posts into website/posts.json. Never fails the
      # deploy: the script exits 0 on any error, and the page falls back to the
      # subscribe CTA whenever posts.json is empty.
      - name: Fetch latest Substack posts
        run: node scripts/fetch-substack-posts.mjs || true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
