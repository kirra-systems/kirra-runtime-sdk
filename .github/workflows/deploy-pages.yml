name: Deploy website to GitHub Pages

# Publishes the static site in website/ to GitHub Pages on every push to main
# that touches the site (or on manual dispatch).

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'scripts/fetch-substack-posts.mjs'
      - 'scripts/lighthouse-bake.mjs'
      - '.github/workflows/deploy-pages.yml'
  # Daily rebuild so the Field Notes feed picks up new Substack posts.
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Enables Pages (build type = GitHub Actions) if not already enabled.
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
        with:
          enablement: true

      # Bake the latest Substack posts into website/posts.json. Never fails the
      # deploy: the script exits 0 on any error, and the page falls back to the
      # subscribe CTA whenever posts.json is empty.
      - name: Fetch latest Substack posts
        run: node scripts/fetch-substack-posts.mjs || true

      # Measure real Lighthouse scores against the site being deployed and bake
      # them into website/lighthouse.json (the footer renders them). Never fails
      # the deploy: the script exits 0 on any error and leaves the previous
      # measurement in place. Ubuntu runners ship Chrome; Lighthouse finds it.
      - name: Measure Lighthouse scores
        run: node scripts/lighthouse-bake.mjs || true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
