# .github/workflows/release.yml
#
# Automated release builds for Kirra Safety Kernel.
# Triggers on git tag push matching v* (e.g. v1.0.0, v1.2.3-rc1).
#
# Usage:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# This workflow:
#   1. Builds the React dashboard (once, shared across all platform builds)
#   2. Builds binaries for x86_64, aarch64, and armv7 (Linux, musl static)
#   3. Packages each as a .tar.gz with dashboard, install.sh and INSTALL.md
#   4. Generates SHA256 checksums
#   5. Creates a GitHub Release with all artifacts attached

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # Required to create GitHub releases

jobs:
  build-dashboard:
    name: Build dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dashboard
        run: cd dashboard && npm install && npm run build

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: kirra-dashboard-dist
          path: dashboard/dist/
          retention-days: 1

  build:
    name: Build ${{ matrix.target_name }}
    needs: build-dashboard
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            target_name: x86_64-linux
            cross: false

          - target: aarch64-unknown-linux-musl
            target_name: aarch64-linux
            cross: true

          - target: armv7-unknown-linux-musleabihf
            target_name: armv7-linux
            cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for ARM targets)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build kirra_verifier_service
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin kirra_verifier_service
          else
            # x86_64 musl needs musl-tools
            sudo apt-get install -y musl-tools
            cargo build --release --target ${{ matrix.target }} --bin kirra_verifier_service
          fi

      - name: Build kirra_carla_client
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin kirra_carla_client
          else
            cargo build --release --target ${{ matrix.target }} --bin kirra_carla_client
          fi

      - name: Download dashboard
        uses: actions/download-artifact@v4
        with:
          name: kirra-dashboard-dist
          path: dashboard-dist/

      - name: Package release
        run: |
          VERSION="${{ github.ref_name }}"
          TARGET_NAME="${{ matrix.target_name }}"
          TARGET="${{ matrix.target }}"
          ARCHIVE_NAME="kirra-${VERSION}-${TARGET_NAME}.tar.gz"

          # Create staging layout
          mkdir -p staging/kirra staging/systemd staging/dashboard

          # Binaries
          cp "target/${TARGET}/release/kirra_verifier_service" staging/kirra/
          cp "target/${TARGET}/release/kirra_carla_client"     staging/kirra/
          chmod 755 staging/kirra/*

          # Dashboard
          cp -r dashboard-dist/. staging/dashboard/

          # Supporting files
          cp install.sh     staging/
          cp INSTALL.md     staging/
          cp README.md      staging/ 2>/dev/null || true
          cp LICENSE        staging/ 2>/dev/null || true
          cp scripts/kirra-verifier.service   staging/systemd/
          cp scripts/kirra-dashboard.service  staging/systemd/
          echo "${VERSION}" > staging/VERSION

          # Create archive
          tar -czf "${ARCHIVE_NAME}" -C staging .
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "${GITHUB_ENV}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kirra-${{ matrix.target_name }}
          path: kirra-*.tar.gz
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          # Extract the relevant section from CHANGELOG.md if it exists
          if [ -f CHANGELOG.md ]; then
            awk "/^## \[?${VERSION}\]?/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md \
                > release_notes.md
          fi
          if [ ! -s release_notes.md ]; then
            echo "Release ${VERSION}" > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Kirra ${{ github.ref_name }}
          body_path: release_notes.md
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
