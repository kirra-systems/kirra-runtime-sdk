# .github/workflows/release.yml
#
# Automated release builds for Kirra Safety Kernel.
# Triggers on git tag push matching v* (e.g. v1.0.0, v1.2.3-rc1).
#
# Usage:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# This workflow:
#   1. Builds the React dashboard (once, shared across all platform builds)
#   2. Builds binaries for x86_64, aarch64, and armv7 (Linux, musl static)
#   3. Packages each as a .tar.gz with dashboard, install.sh and INSTALL.md
#   4. Generates a CycloneDX SBOM for the shipped binaries (WS-0.6)
#   5. Generates SHA256 checksums
#   6. Signs every artifact with cosign (keyless, GitHub OIDC — WS-0.6)
#   7. Creates a GitHub Release with artifacts + SBOM + signature bundles

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # Required to create GitHub releases
  id-token: write  # WS-0.6: keyless cosign signing (GitHub OIDC identity)

jobs:
  build-dashboard:
    name: Build dashboard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build dashboard
        run: cd dashboard && npm install && npm run build

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v7
        with:
          name: kirra-dashboard-dist
          path: dashboard/dist/
          retention-days: 1

  build:
    name: Build ${{ matrix.target_name }}
    needs: build-dashboard
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            target_name: x86_64-linux
            cross: false

          - target: aarch64-unknown-linux-musl
            target_name: aarch64-linux
            cross: true

          - target: armv7-unknown-linux-musleabihf
            target_name: armv7-linux
            cross: true

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for ARM targets)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build kirra_verifier_service
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin kirra_verifier_service
          else
            # x86_64 musl needs musl-tools
            sudo apt-get install -y musl-tools
            cargo build --release --target ${{ matrix.target }} --bin kirra_verifier_service
          fi

      - name: Build kirra_carla_client
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin kirra_carla_client
          else
            cargo build --release --target ${{ matrix.target }} --bin kirra_carla_client
          fi

      - name: Download dashboard
        uses: actions/download-artifact@v8
        with:
          name: kirra-dashboard-dist
          path: dashboard-dist/

      - name: Package release
        run: |
          VERSION="${{ github.ref_name }}"
          TARGET_NAME="${{ matrix.target_name }}"
          TARGET="${{ matrix.target }}"
          ARCHIVE_NAME="kirra-${VERSION}-${TARGET_NAME}.tar.gz"

          # Create staging layout
          mkdir -p staging/kirra staging/systemd staging/dashboard

          # Binaries
          cp "target/${TARGET}/release/kirra_verifier_service" staging/kirra/
          cp "target/${TARGET}/release/kirra_carla_client"     staging/kirra/
          chmod 755 staging/kirra/*

          # Dashboard
          cp -r dashboard-dist/. staging/dashboard/

          # Supporting files
          cp install.sh     staging/
          cp INSTALL.md     staging/
          cp README.md      staging/ 2>/dev/null || true
          cp LICENSE        staging/ 2>/dev/null || true
          cp scripts/kirra-verifier.service   staging/systemd/
          cp scripts/kirra-dashboard.service  staging/systemd/
          echo "${VERSION}" > staging/VERSION

          # Create archive
          tar -czf "${ARCHIVE_NAME}" -C staging .
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> "${GITHUB_ENV}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: kirra-${{ matrix.target_name }}
          path: kirra-*.tar.gz
          retention-days: 1

  # WS-0.6 — CycloneDX SBOM for the shipped binaries. Generated from the
  # committed lockfile (--locked: the SBOM must describe what the build jobs
  # actually built, never a re-resolve). One SBOM per release, named with
  # the version so it travels with the artifacts.
  sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate SBOM for the release binaries
        run: |
          VERSION="${{ github.ref_name }}"
          # `--describe binaries` emits one SBOM per workspace binary; the
          # release ships exactly two (kirra_verifier_service and
          # kirra_carla_client, both from the root crate — their SBOMs land
          # in the repo root). Keep those two, version-prefixed so they are
          # self-identifying next to the tarballs; the committed Cargo.lock
          # is what cargo metadata resolves, so the SBOM describes what the
          # build jobs actually built.
          cargo cyclonedx --describe binaries --format json --spec-version 1.5 -q
          for bin in kirra_verifier_service kirra_carla_client; do
            mv "./${bin}_bin.cdx.json" "kirra-${VERSION}-${bin}.cdx.json"
          done
          # Trial outputs for non-shipped workspace binaries are not release
          # artifacts — drop them so the upload glob can't pick one up.
          find . -name '*_bin.cdx.json' -delete
          find . -name '*.cdx.json' -not -name "kirra-${VERSION}-*" -delete
          ls -l ./*.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: kirra-sbom
          path: kirra-*.cdx.json
          retention-days: 1

  # WS-5.1 — the QNX governor-judge artifact: the no_std core-only verdict
  # staticlib for both QNX 8.0 tuples, tarred with its ABI header and
  # provenance manifest. Named kirra-<version>-qnx800-judge.tar.gz so the
  # release job's existing *.tar.gz handling carries it into SHA256SUMS and
  # the keyless cosign signing — the artifact enters the supply-chain trust
  # chain like every platform tarball. Functional artifact only: timing/WCET
  # evidence is QNX-target-only (PROVENANCE.txt states this).
  qnx-artifact:
    name: QNX governor-judge artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust toolchain (+rust-src for -Zbuild-std)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-src

      - name: Build the judge staticlibs
        run: scripts/build_qnx_judge_artifact.sh dist-qnx

      - name: Package
        run: |
          VERSION="${{ github.ref_name }}"
          tar -czf "kirra-${VERSION}-qnx800-judge.tar.gz" -C dist-qnx .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: kirra-qnx800-judge
          path: kirra-*-qnx800-judge.tar.gz
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: [build, sbom, qnx-artifact]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.cdx.json > SHA256SUMS
          cat SHA256SUMS

      # WS-0.6 — keyless cosign signatures over every release artifact.
      # The signing identity is this workflow's GitHub OIDC identity (repo +
      # workflow path + tag ref), recorded in the public Rekor transparency
      # log; each artifact gets a self-contained .cosign.bundle (signature +
      # certificate + Rekor proof) that verifies OFFLINE against the pinned
      # identity — no key management, nothing to leak.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts (keyless, GitHub OIDC)
        run: |
          cd dist
          for f in *.tar.gz *.cdx.json SHA256SUMS; do
            cosign sign-blob --yes --bundle "${f}.cosign.bundle" "${f}"
          done
          ls -l ./*.cosign.bundle

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          # WS-0.7: the changelog section is REQUIRED. Extract the section
          # whose heading names the pushed tag; a missing/empty section
          # FAILS the release — no more "Release vX" fallback notes. Write
          # the section in CHANGELOG.md (rename [Unreleased]) and re-tag.
          #
          # Exact-prefix match on the BRACKETED heading ("## [vX.Y.Z]") —
          # the version is compared as a STRING, never interpolated into a
          # regex, so dots can't wildcard and "v1.1.2" can't match a
          # "v1.1.21" section (the closing bracket bounds it).
          if [ ! -f CHANGELOG.md ]; then
            echo "::error::CHANGELOG.md is missing — a release must ship real notes (WS-0.7)."
            exit 1
          fi
          awk -v ver="${VERSION}" '
            /^## / { want = "## [" ver "]"; flag = (substr($0, 1, length(want)) == want); next }
            flag' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "::error file=CHANGELOG.md::No '## [${VERSION}]' section found in CHANGELOG.md —" \
                 "a release must ship real notes (WS-0.7). Add the section (rename [Unreleased])," \
                 "then delete and re-push the tag."
            exit 1
          fi
          # WS-0.6: verification instructions travel with every release.
          cat >> release_notes.md <<'VERIFY'

          ---
          ### Verify artifact signatures (cosign, keyless)

          Every artifact (tarballs, SBOM, `SHA256SUMS`) carries a
          `.cosign.bundle` — signature + signing certificate + transparency-log
          proof, verifiable offline:

          ```sh
          cosign verify-blob \
            --bundle <artifact>.cosign.bundle \
            --certificate-identity-regexp \
              'https://github.com/kirra-systems/kirra-runtime-sdk/\.github/workflows/release\.yml@refs/tags/.*' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            <artifact>
          ```

          The `kirra-*.cdx.json` files are the CycloneDX SBOM for the shipped
          binaries, generated from the committed lockfile.
          VERIFY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Kirra ${{ github.ref_name }}
          body_path: release_notes.md
          files: |
            dist/*.tar.gz
            dist/*.cdx.json
            dist/SHA256SUMS
            dist/*.cosign.bundle
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
