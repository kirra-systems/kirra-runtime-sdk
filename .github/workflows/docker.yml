name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write
  id-token: write  # WS-0.6: keyless cosign image signing (GitHub OIDC)

jobs:
  verifier:
    name: Build verifier image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # #797 F6 — the REGISTRY half of the A4 version-ordering guard
      # (ci/check_version_ordering.py covers the in-repo line): refuse to
      # publish while any ghcr tag semver-exceeds the version being built, so
      # a semver image-update policy can never "upgrade" a fleet onto an old
      # image. The pre-existing Aegis-era 1.5.0/1.5 tags are allowlisted with
      # justifications in ci/ghcr_legacy_tags.json pending OWNER deletion or
      # re-tag; any NEW offender reds this job before anything is pushed.
      - name: ghcr tag-ordering guard (no tag may semver-exceed this build)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 ci/check_ghcr_tag_ordering.py

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # #798 F6 — the images previously shipped with a signature but NO
          # SBOM and NO provenance. BuildKit attestations close both: an SBOM
          # attestation per platform and max-detail SLSA provenance, attached
          # to the image in the registry (inspect with
          # `docker buildx imagetools inspect <image>@<digest>`).
          sbom: true
          provenance: mode=max

      # WS-0.6 — keyless cosign signature over the pushed image, BY DIGEST
      # (a tag is mutable; the digest is the artifact). The signature is
      # stored in the registry next to the image and recorded in Rekor.
      #
      # #798 F7 — verify with an EXACT or ANCHORED identity, never `@.*`
      # (which matched every build of this workflow, including any branch
      # push). For a release image, pin the exact tag:
      #   cosign verify ghcr.io/<image>@<digest> \
      #     --certificate-identity \
      #       'https://github.com/kirra-systems/kirra-runtime-sdk/.github/workflows/docker.yml@refs/tags/vX.Y.Z' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      # For a main-branch image, the identity is
      #   ...docker.yml@refs/heads/main
      # If a regexp is unavoidable, ANCHOR it end-to-end:
      #   --certificate-identity-regexp '^https://github\.com/kirra-systems/kirra-runtime-sdk/\.github/workflows/docker\.yml@refs/tags/v[0-9]+\.[0-9]+\.[0-9]+(-(rc|beta|alpha)[0-9]*)?$'
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (keyless, GitHub OIDC)
        run: cosign sign --yes "ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}"

  dashboard:
    name: Build dashboard image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # #797 F6 — same registry-ordering guard over the dashboard package.
      - name: ghcr tag-ordering guard (no tag may semver-exceed this build)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_PACKAGE: kirra-dashboard
        run: python3 ci/check_ghcr_tag_ordering.py

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/kirra-dashboard
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        id: build
        with:
          context: dashboard
          file: dashboard/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # #798 F6 — SBOM + max-detail SLSA provenance attestations, same as
          # the verifier image above.
          sbom: true
          provenance: mode=max

      # WS-0.6 — same keyless by-digest signature as the verifier image.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (keyless, GitHub OIDC)
        run: cosign sign --yes "ghcr.io/${{ github.repository_owner }}/kirra-dashboard@${{ steps.build.outputs.digest }}"
