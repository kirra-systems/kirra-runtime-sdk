name: ROSMASTER R2 firmware

on:
  pull_request:
    paths:
      - "firmware/rosmaster-r2/**"
      - ".github/workflows/rosmaster-r2-firmware.yml"
  push:
    branches: [main]
    paths:
      - "firmware/rosmaster-r2/**"
      - ".github/workflows/rosmaster-r2-firmware.yml"

permissions:
  contents: read

jobs:
  host-verification:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install analysis tools
        run: sudo apt-get update && sudo apt-get install -y clang-tidy-18 cppcheck doxygen graphviz lcov
      - name: Configure
        run: >
          cmake -S firmware/rosmaster-r2 -B /tmp/r2-build
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DR2_ENABLE_SANITIZERS=ON
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Build
        run: cmake --build /tmp/r2-build --parallel
      - name: Unit and integration tests
        run: ctest --test-dir /tmp/r2-build --output-on-failure
      - name: Deterministic simulation
        run: /tmp/r2-build/r2_deterministic_sim
      - name: clang-tidy
        run: |
          for source in \
            firmware/rosmaster-r2/kinematics/src/ackermann.cpp \
            firmware/rosmaster-r2/control/src/motion_controller.cpp \
            firmware/rosmaster-r2/protocol/src/wire.cpp \
            firmware/rosmaster-r2/safety/src/safety_manager.cpp \
            firmware/rosmaster-r2/firmware/src/configuration.cpp \
            firmware/rosmaster-r2/firmware/src/control_loop.cpp \
            firmware/rosmaster-r2/firmware/src/runner.cpp \
            firmware/rosmaster-r2/firmware/src/safe_hal.cpp; do
            clang-tidy-18 -p /tmp/r2-build "$source"
          done
      - name: cppcheck
        run: >
          cppcheck --enable=warning,style,performance,portability
          --error-exitcode=1 --inline-suppr --std=c++17
          -Ifirmware/rosmaster-r2/hal/include
          -Ifirmware/rosmaster-r2/kinematics/include
          -Ifirmware/rosmaster-r2/control/include
          -Ifirmware/rosmaster-r2/protocol/include
          -Ifirmware/rosmaster-r2/diagnostics/include
          -Ifirmware/rosmaster-r2/safety/include
          -Ifirmware/rosmaster-r2/firmware/include
          -Ifirmware/rosmaster-r2/bootloader/include
          firmware/rosmaster-r2/hal
          firmware/rosmaster-r2/kinematics
          firmware/rosmaster-r2/control
          firmware/rosmaster-r2/protocol
          firmware/rosmaster-r2/diagnostics
          firmware/rosmaster-r2/safety
          firmware/rosmaster-r2/firmware
          firmware/rosmaster-r2/bootloader
      - name: API documentation
        working-directory: firmware/rosmaster-r2
        run: doxygen Doxyfile

  coverage:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install coverage tools
        run: sudo apt-get update && sudo apt-get install -y lcov
      - name: Build and test with coverage
        run: |
          cmake -S firmware/rosmaster-r2 -B /tmp/r2-coverage \
            -DR2_ENABLE_COVERAGE=ON -DR2_BUILD_SIMULATION=OFF
          cmake --build /tmp/r2-coverage --parallel
          ctest --test-dir /tmp/r2-coverage --output-on-failure
      - name: Coverage floor
        run: |
          lcov --capture --directory /tmp/r2-coverage --output-file /tmp/r2.info
          lcov --remove /tmp/r2.info '/usr/*' '*/tests/*' \
            --output-file /tmp/r2.filtered.info
          line_rate="$(lcov --summary /tmp/r2.filtered.info | awk '/lines/{gsub(/%/,"",$2); print $2}')"
          awk -v rate="$line_rate" 'BEGIN { exit !(rate >= 80.0) }'

  decoder-fuzz:
    # Coverage-guided libFuzzer run against the untrusted R2CP decode path.
    # The same oracle (fuzz/decode_fuzz.hpp::decode_one) also runs deterministically
    # under ASAN/UBSAN on every PR inside host-verification's ctest sweep; this job
    # adds a bounded coverage-guided run seeded from fuzz/corpus.
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install Clang + fuzzer runtime
        run: sudo apt-get update && sudo apt-get install -y clang-18 libclang-rt-18-dev
      - name: Configure (libFuzzer)
        run: >
          cmake -S firmware/rosmaster-r2 -B /tmp/r2-fuzz
          -DCMAKE_CXX_COMPILER=clang++-18
          -DR2_BUILD_FUZZERS=ON
          -DR2_BUILD_TESTS=OFF
          -DR2_BUILD_SIMULATION=OFF
      - name: Build fuzzer
        run: cmake --build /tmp/r2-fuzz --parallel
      - name: Fuzz (bounded, seeded)
        run: >
          ASAN_OPTIONS=detect_leaks=0
          /tmp/r2-fuzz/r2_decode_fuzz
          -max_total_time=60 -print_final_stats=1 -error_exitcode=1
          firmware/rosmaster-r2/fuzz/corpus

  target-build:
    # Cross-compile the portable r2_platform_core static library for the target
    # MCU (STM32F103RCT6, Cortex-M3) with arm-none-eabi-gcc. Build-only: it
    # proves the safety core (kinematics / control loop / protocol / safety
    # manager / configuration) carries no host dependency and links no host
    # libc. The linker script, startup/vector table and full flashable image
    # are follow-up slices of #968; a static-library build needs no linker
    # script, so no on-target run happens here (host timing stays indicative).
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install ARM cross toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi
      - name: Configure (Cortex-M3 target)
        run: >
          cmake -S firmware/rosmaster-r2 -B /tmp/r2-target
          -DCMAKE_TOOLCHAIN_FILE=$PWD/firmware/rosmaster-r2/cmake/arm-none-eabi-cortex-m3.cmake
      - name: Cross-compile the safety core
        run: cmake --build /tmp/r2-target --parallel
      - name: Confirm ARM object output
        run: |
          arm-none-eabi-objdump -f /tmp/r2-target/libr2_platform_core.a \
            | grep -q 'architecture: armv7'
          arm-none-eabi-size /tmp/r2-target/libr2_platform_core.a
