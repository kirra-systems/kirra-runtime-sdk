name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test --workspace
      - name: Fault injection tests (ISO 26262 safe-state verification — CERT-004)
        run: cargo test --test fault_injection

  coverage:
    name: Branch Coverage (MC/DC pending — issue #65)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov
      - name: Run MC/DC coverage
        # TODO: restore `--mcdc` once cargo-llvm-cov and rustc nightly realign on
        # the coverage-options value. Current nightly accepts only block|branch|
        # condition; --branch is the closest substitute that compiles today.
        #
        # `--skip wcet_gate` excludes WCET timing assertions from the
        # instrumented run. llvm-cov instrumentation adds 20–50% overhead on
        # O(n) scans, which invalidates wall-clock budgets. The authoritative
        # WCET measurement runs in the dedicated `wcet-gate` job below on a
        # clean stable toolchain.
        run: |
          cargo llvm-cov --workspace --branch \
            --ignore-filename-regex='/.cargo/registry' \
            --lcov --output-path lcov.info \
            -- --skip wcet_gate
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

  wcet-gate:
    name: WCET Gate (non-instrumented timing)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run WCET gate tests
        # Authoritative WCET measurement. Runs on stable, non-instrumented,
        # without llvm-cov. The coverage job above skips these tests because
        # instrumentation overhead invalidates wall-clock thresholds.
        run: cargo test -p kirra-runtime-sdk --lib wcet_gate::ci_gate_tests

  parko-safety:
    name: Parko Safety Tests (no ROS, no ORT)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: parko safety-critical tests
        # `parko/` is a separate workspace and the root `cargo test
        # --workspace` does NOT descend into it. Without this job the
        # ML-path safety tests (parko-core RSS + NaN failsafe,
        # parko-kirra H1 angular-velocity bound + GovernorComparator
        # divergence detection, parko-ros2 M2 MockBackend fail-closed
        # paths) compile as path deps but never RUN in CI — a
        # regression to e.g. the H1 angular cap would land on main with
        # CI green.
        #
        # `--exclude parko-onnx` keeps this job ORT-free (the
        # parko-onnx tests need libonnxruntime + ORT_DYLIB_PATH; see
        # the parko-onnx job below). Future parko crates added to the
        # sub-workspace (parko-ros2 already, anything else later) are
        # picked up automatically by `--workspace`.
        working-directory: parko
        run: cargo test --workspace --exclude parko-onnx

  parko-onnx:
    name: Parko ONNX Backend Tests (ORT v1.24.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install ONNX Runtime v1.24.2
        # Exact version match: `ort 2.0.0-rc.12` (pinned in
        # parko-onnx/Cargo.toml) is compiled against
        # ORT_API_VERSION = 24, which requires ONNX Runtime v1.24.x.
        # The matching minor is v1.24.2 per parko/README.md §"Building
        # and testing parko-onnx" — older runtimes deadlock in the ort
        # error path (documented upstream bug in 2.0.0-rc.12).
        run: |
          set -euo pipefail
          curl -L -o /tmp/onnxruntime-1.24.2.tgz \
            https://github.com/microsoft/onnxruntime/releases/download/v1.24.2/onnxruntime-linux-x64-1.24.2.tgz
          mkdir -p "$HOME/.local/onnxruntime"
          tar -xzf /tmp/onnxruntime-1.24.2.tgz \
            -C "$HOME/.local/onnxruntime" --strip-components=1
          test -f "$HOME/.local/onnxruntime/lib/libonnxruntime.so" \
            || (echo "libonnxruntime.so missing after install"; exit 1)
      - name: parko-onnx tests
        # ORT-dependent. If this job proves flaky in CI (network
        # download, ABI mismatch on a future Ubuntu image, etc.), it
        # MAY be flipped to `continue-on-error: true` so the safety
        # gate above continues to gate on its own — but the safety
        # gate must NEVER be made non-gating.
        #
        # FAST-FAIL: `ort 2.0.0-rc.12` can DEADLOCK in its error path,
        # hanging the test binary indefinitely (observed: the job ran for
        # >1h with no progress). `timeout-minutes` converts that 6h hang
        # into a fast, visible failure WITHOUT making the job non-gating
        # (no continue-on-error — a real failure still blocks). A healthy
        # compile+run finishes well inside the budget. `--nocapture` +
        # backtrace surface the panic reason inline so a fast-failed run is
        # diagnosable (the captured "failures:" section never prints when the
        # binary hangs).
        timeout-minutes: 10
        working-directory: parko
        env:
          ORT_DYLIB_PATH: ${{ env.HOME }}/.local/onnxruntime/lib/libonnxruntime.so
          RUST_BACKTRACE: "1"
        run: cargo test -p parko-onnx -- --nocapture

  parko-openvino:
    name: Parko OpenVINO Backend Tests (apt openvino-2024)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install ONNX Runtime v1.24.2 (cross-backend equivalence test)
        # The OpenVINO test suite includes a cross-backend equivalence
        # test (`ort_ov_output_equivalence_on_mnist`) that loads the SAME
        # MNIST model through parko-onnx's `OrtBackend` and compares its
        # output to OpenVINO's. That backend dlopens libonnxruntime.so at
        # runtime (ort `load-dynamic`), so this job needs the ONNX runtime
        # too — identical install to the parko-onnx job. Without it the
        # equivalence test panics ("Is libonnxruntime.so installed?").
        run: |
          set -euo pipefail
          curl -L -o /tmp/onnxruntime-1.24.2.tgz \
            https://github.com/microsoft/onnxruntime/releases/download/v1.24.2/onnxruntime-linux-x64-1.24.2.tgz
          mkdir -p "$HOME/.local/onnxruntime"
          tar -xzf /tmp/onnxruntime-1.24.2.tgz \
            -C "$HOME/.local/onnxruntime" --strip-components=1
          test -f "$HOME/.local/onnxruntime/lib/libonnxruntime.so" \
            || (echo "libonnxruntime.so missing after install"; exit 1)
      # ======================================================================
      # ⚠️ DRAFT — UNTESTED. Validate on a machine with OpenVINO before merge.
      # ----------------------------------------------------------------------
      # Replaces the apt install with a CLEAN-RELEASE OpenVINO ARCHIVE (.tgz),
      # the remediation for issue #143: the apt `openvino-2024.5.0` package is a
      # PR-tagged build (`…-refs/pull/3856/head`) whose version string the
      # `openvino` 0.11 crate rejects as "version too old" (openvino-rs#167).
      # A clean release archive carries a normal `2024.x.y` version tag the
      # crate should accept. The archive layout is fixed and known (unlike the
      # apt package), so no path discovery is needed.
      #
      # WHY THIS IS A DRAFT (cannot be verified in the cloud agent sandbox —
      # egress-blocked 403 from storage.openvinotoolkit.org). A reviewer with
      # an OpenVINO-capable runner MUST:
      #   1. PIN the exact archive URL/build by browsing the storage listing
      #      https://storage.openvinotoolkit.org/repositories/openvino/packages/
      #      and picking a clean release for the runner's Ubuntu (ubuntu24 for
      #      ubuntu-latest) + x86_64. Fill OPENVINO_VERSION / OPENVINO_TARBALL.
      #   2. CONFIRM the `openvino` 0.11 crate ACCEPTS that version (OvBackend::new
      #      succeeds — not "too old" again; openvino-rs#167 may also bound the
      #      UPPER end, so the chosen release must be in the crate's supported
      #      window, or the crate must be bumped).
      #   3. NOTE: even with OpenVINO fixed, `ort_ov_output_equivalence_on_mnist`
      #      still hangs on the ort #144 deadlock until that is resolved — keep
      #      the timeout-minutes on the test step.
      # ======================================================================
      - name: Install OpenVINO runtime (clean-release archive)  # DRAFT — see #143
        run: |
          set -euo pipefail
          # TODO(#143): pin these to a real, crate-accepted clean release.
          OPENVINO_VERSION="2024.6.0"                       # TODO: verify crate accepts it
          OPENVINO_DIST="ubuntu24"                          # ubuntu-latest == 24.04
          # The full tarball name includes a build id, e.g.
          #   l_openvino_toolkit_ubuntu24_2024.6.0.<build>_x86_64.tgz
          # Pin the exact name from the storage listing (it is NOT derivable):
          OPENVINO_TARBALL="l_openvino_toolkit_${OPENVINO_DIST}_${OPENVINO_VERSION}.PINME_x86_64.tgz"
          BASE="https://storage.openvinotoolkit.org/repositories/openvino/packages/${OPENVINO_VERSION%.*}/linux"
          curl -fL -o /tmp/openvino.tgz "${BASE}/${OPENVINO_TARBALL}"
          mkdir -p "$HOME/.local/openvino"
          tar -xzf /tmp/openvino.tgz -C "$HOME/.local/openvino" --strip-components=1
          # Fixed archive layout: runtime libs + bundled TBB.
          OV_LIB="$HOME/.local/openvino/runtime/lib/intel64"
          OV_TBB="$HOME/.local/openvino/runtime/3rdparty/tbb/lib"
          test -f "${OV_LIB}/libopenvino_c.so" \
            || { echo "::error::libopenvino_c.so missing in archive at ${OV_LIB}"; ls -R "$HOME/.local/openvino" | head -50; exit 1; }
          echo "OpenVINO C runtime: ${OV_LIB}"; ls -1 "${OV_LIB}"/libopenvino_c.so*
          # Export both the core lib dir and the TBB dir (libopenvino_c.so
          # depends on libtbb) for the test step's LD_LIBRARY_PATH.
          echo "OPENVINO_LIBDIR=${OV_LIB}:${OV_TBB}" >> "${GITHUB_ENV}"
      - name: parko-openvino tests
        # OpenVINO-dependent. Same flakiness disposition as
        # parko-onnx: if this job becomes unreliable in CI (Intel apt
        # outage, future Ubuntu ABI break), it MAY be flipped to
        # `continue-on-error: true`. The parko-safety gate above must
        # remain gating regardless.
        #
        # FAST-FAIL (same rationale as parko-onnx): the cross-backend
        # equivalence test uses ORT, whose 2.0.0-rc.12 error-path deadlock
        # hangs the binary indefinitely; `timeout-minutes` makes that a fast,
        # visible failure while the job stays GATING (no continue-on-error).
        # `--nocapture` + backtrace surface why the OvBackend tests fail (the
        # 3 `OvBackend::new(...).expect(...)` panics) inline, since a hung
        # binary never prints the captured failures section.
        timeout-minutes: 10
        working-directory: parko
        env:
          # ONNX runtime for the cross-backend equivalence test (parko-onnx
          # `OrtBackend`, ort load-dynamic).
          ORT_DYLIB_PATH: ${{ env.HOME }}/.local/onnxruntime/lib/libonnxruntime.so
          # OpenVINO runtime dir discovered by the install step above (the apt
          # package's real location, not an assumed path). openvino-finder
          # checks LD_LIBRARY_PATH before its built-in dir list, so this makes
          # the runtime discoverable wherever apt put it.
          LD_LIBRARY_PATH: ${{ env.OPENVINO_LIBDIR }}
          RUST_BACKTRACE: "1"
        run: cargo test -p parko-openvino -- --nocapture


  static-analysis:
    name: Static Analysis (ISO 26262)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Clippy
        run: |
          cargo clippy --workspace -- \
            -D warnings \
            -W clippy::all \
            -A clippy::module_name_repetitions \
            -A clippy::must_use_candidate \
            2>&1 | tee clippy-report.txt
      - name: Dependency audit
        run: cargo audit 2>&1 | tee audit-report.txt
      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: static-analysis-reports
          path: |
            clippy-report.txt
            audit-report.txt
