name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Auto-cancel superseded runs. Without this, every push to a PR (or main)
# leaves the prior run churning — they don't share a concurrency group, so
# nothing cancels them and they pile up holding runners until they finally
# time out. Group per workflow + ref so each PR/branch keeps only its newest
# run; `cancel-in-progress` reaps the rest the moment a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Cargo network resilience. crates.io downloads on GitHub runners
# intermittently die with curl "[16] Error in the HTTP2 framing layer"
# mid-transfer. The repo convention is no rust-cache, so every run fetches
# from scratch and is fully exposed to the flake. Disabling HTTP/2
# multiplexing (fall back to HTTP/1.1) removes the framing-layer fault, and
# the retries absorb any remaining transient blips. Applies to all jobs.
env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  # WS-0.6 — supply-chain gate. Deterministic checks only (licenses / bans /
  # sources go red only when the dependency tree or the policy changes).
  # Policy: /deny.toml — one policy file for both workspaces; the pin step
  # below ASSERTS parko/deny.toml is still a symlink to it (#797 F9 — a
  # replaced regular file would silently fork the policy).
  #
  # #797 F3 (#775): the policy graph resolves the FULL feature set — see
  # deny.toml [graph] all-features = true (the one policy file; set there,
  # not per-invocation, so a local `cargo deny check` resolves identically).
  # That folds the feature-gated production trees into every check below:
  # root `ros2` (r2r + ROS message chain), `tpm` (tss-esapi + bindgen chain),
  # `capture`, and parko's backend features. The inventory of what stays
  # OUTSIDE the policy graph is documented on that [graph] section.
  supply-chain:
    name: supply-chain gate (cargo-deny)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Single-policy pin — parko/deny.toml must BE the root policy (symlink)
        # #797 F9: the one-policy claim is load-bearing for every parko check
        # below; assert the mechanism instead of trusting a comment.
        run: |
          test -L parko/deny.toml || { echo "parko/deny.toml is not a symlink — policy forked"; exit 1; }
          test "$(readlink parko/deny.toml)" = "../deny.toml" \
            || { echo "parko/deny.toml points at $(readlink parko/deny.toml), not ../deny.toml"; exit 1; }
      - name: Deny gate — root workspace, full feature graph (licenses / bans / sources)
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2
        with:
          command: check licenses bans sources
          arguments: --locked
      - name: Deny gate — parko workspace, full feature graph (licenses / bans / sources)
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2
        with:
          command: check licenses bans sources
          arguments: --locked
          # One policy: parko/deny.toml -> ../deny.toml, asserted by the pin
          # step above.
          manifest-path: ./parko/Cargo.toml
      # WP-04 (MGA G-6): advisories are now GATING. A new RUSTSEC advisory on a
      # locked dependency reds the PR until it is either bumped (the normal
      # path — cf. the crossbeam-epoch RUSTSEC-2026-0204 bump) or explicitly
      # triaged into the deny.toml `[advisories].ignore` allowlist with a
      # written justification + expiry. The allowlist is the pressure-relief
      # valve that makes a hard gate operable: an advisory that fires while a
      # fix is unreleased gets a scoped, dated ignore entry — never
      # `continue-on-error`, which let EVERY advisory pass unseen.
      - name: Advisories (gating — triage via deny.toml [advisories].ignore)
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2
        with:
          command: check advisories
          arguments: --locked
      - name: Advisories — parko workspace (gating, same policy)
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2
        with:
          command: check advisories
          arguments: --locked
          manifest-path: ./parko/Cargo.toml

  # #775 F2 — enforce the M-6 action-pinning policy (SECURITY.md): every
  # third-party action reference MUST be a 40-hex commit SHA, never a mutable
  # tag. A repointed `@v3` on cosign-installer (which the release job runs while
  # holding the OIDC signing identity) or `@v2` on cargo-deny-action (which IS
  # this gate) would otherwise silently deliver attacker code. `--check` is
  # network-free (no writes, no ls-remote) — it just greps for unpinned refs.
  # Dependabot (.github/dependabot.yml, github-actions ecosystem) maintains the
  # SHAs as new versions ship.
  action-pinning:
    name: action-pinning gate (M-6 SHA pins)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: All workflow actions must be SHA-pinned
        run: scripts/pin-actions.sh --check
      # A4 (#1049) — the version line must never sort backwards again (the
      # 1.5.0-Aegis -> 1.1.2-Kirra renumbering). Forward ratchet vs
      # ci/version_floor.txt + asserts the §2.1 inversion stays documented until
      # a >= 2.0.0 MAJOR clears it. Network-free; a backward bump reds here.
      - name: Version-ordering gate (A4 — never sort backwards)
        run: python3 ci/check_version_ordering.py

  # M3 (#1042) — cross-distro closure-comparator self-test. The Humble↔Jazzy
  # wire-safety argument rests on the curated `.msg` closures being byte-identical
  # across distros. The bench tool (crossdistro_hash_check.sh) needs real dual-distro
  # msg shares, so it is not itself per-PR gateable — but its NEW closure-inclusive
  # comparator (closure_diff.py, which walks the full recursive closure incl. base
  # messages, not just the curated leaf) has its LOGIC gated here: the self-test runs
  # it over committed fixture trees and proves it detects a nested base-message drift
  # the old leaf-only step-3 missed. Pure python3, no ROS — never flakes.
  msgsync-closure-selftest:
    name: cross-distro closure comparator self-test (M3)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: closure_diff.py catches nested drift the leaf-only check misses
        run: bash scripts/curated_interface/closure_diff_selftest.sh

  # WS-3.1 — the scenario-KPI gate: thresholds unsafe_miss_rate /
  # admissibility / hazard_recall over the generated deterministic corpus
  # (248 doer scenarios + 71 perception frames) against the reviewed policy
  # in ci/scenario_kpi_thresholds.json. Red = a fleet-safety KPI regressed
  # (the corpus and planners are deterministic — never flake). The WS-3 DoD:
  # no safety-relevant PR merges without this gate.
  scenario-kpi-gate:
    name: scenario-KPI gate (WS-3.1)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: KPI gate (unsafe_miss_rate / admissibility / hazard_recall)
        # WP-23: the deterministic sweep PLUS the seeded Monte-Carlo campaign at
        # the per-PR sampled-subset size (95% CI bounds). The full 10⁴–10⁵ corpus
        # runs nightly in kpi-campaign-nightly.yml.
        env:
          KIRRA_KPI_MC_PROFILE: per_pr
        run: cargo run --locked -p kirra-kpi-gate --bin scenario_kpi_gate

  # WS-5.1 — the QNX governor-judge cross-build: the EPIC-#270 no_std
  # core-only judge staticlib for both QNX 8.0 tuples (x86_64 + the aarch64
  # deployment ISA), via stable + -Zbuild-std=core (no proprietary SDP — a
  # staticlib needs no final link). Proves on every PR that the partition
  # verdict core still cross-compiles; the release workflow ships the same
  # artifact into the SHA256SUMS + cosign chain. NO timing claim (see the
  # script header / PROVENANCE.txt).
  qnx-governor-artifact:
    name: QNX governor-judge cross-build (WS-5.1)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # #790 F5 — PIN the compiler for the judge lane so the PR-proven compiler is
      # the SAME one the release lane ships (a floating `stable` could rename the
      # nto-qnx800 tuples or change -Zbuild-std syntax on any release day). Bump
      # this in lock-step with the release workflow; the pinned version is recorded
      # in the artifact PROVENANCE.txt.
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.94.1"
          components: rust-src
      - name: Build the judge staticlibs (x86_64 + aarch64 nto-qnx800)
        run: scripts/build_qnx_judge_artifact.sh dist-qnx
      # #790 F2 — reproducibility gate: build a SECOND time and byte-compare the
      # staticlibs (PROVENANCE.txt is intentionally build-varying — ci-run id etc. —
      # so it is excluded). A non-deterministic judge core would fail here BEFORE it
      # could be checksummed, cosign-signed, and shipped as the partition verdict.
      - name: Reproducibility (double-build cmp of the staticlibs)
        run: |
          scripts/build_qnx_judge_artifact.sh dist-qnx-2
          rc=0
          for a in dist-qnx/libkirra_judge-*.a; do
            b="dist-qnx-2/$(basename "$a")"
            if cmp -s "$a" "$b"; then
              echo "reproducible: $(basename "$a")"
            else
              echo "::error::non-reproducible staticlib: $(basename "$a")"; rc=1
            fi
          done
          cmp -s dist-qnx/kirra_ffi.h dist-qnx-2/kirra_ffi.h || { echo "::error::kirra_ffi.h differs"; rc=1; }
          exit $rc
      # #790 F1 — host-native harness lane: link the C++ SHIM against a same-commit
      # judge and run the FDIT/demo ctests, so the compile-time ABI layout asserts
      # (kirra_ffi.h / kirra_judge.rs) actually fire against this judge build.
      - name: Host-native harness (cmake + ctest)
        run: |
          cmake -S tools/qnx-rtm-harness -B build-harness
          cmake --build build-harness
          ctest --test-dir build-harness --output-on-failure
      - name: Upload artifact (PR inspection; releases ship the signed copy)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: kirra-qnx800-judge
          path: dist-qnx/
          retention-days: 7

  # M4 — MSRV enforcement. The manifests declare `rust-version = "1.88"`
  # (docs/VERSIONING_POLICY.md §3; the floor is set by locked deps such as
  # time-core 0.1.9 / serde_with 3.21 / darling 0.23 — all require 1.88 — not by
  # our own code). This lane makes that a SELF-VERIFYING gate instead of a
  # comment: it compiles the whole workspace on the exact MSRV toolchain, so a PR
  # that reaches for a newer-than-1.88 lang/stdlib feature reds HERE with a clear
  # message, rather than silently invalidating the published floor. `+1.88.0` is
  # explicit so it holds regardless of `rust-toolchain.toml` (which pins the far
  # newer BUILD toolchain). Raising the MSRV is a deliberate MINOR bump (policy
  # §3): update both `rust-version` fields, the CHANGELOG, and this lane together.
  fmt:
    name: rustfmt gate (all cargo trees)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt
      # Every cargo tree in the repo, including the workspace-detached
      # harnesses. The frozen kinematics talisman is excluded via
      # `#[rustfmt::skip]` on its `mod` declarations (kirra-core lib.rs +
      # the kani #[path] include) — its git blob pin (`ed00f4da…`) must
      # survive any formatting pass; the step below asserts exactly that.
      - name: cargo fmt --check — root workspace
        run: cargo fmt --check
      - name: cargo fmt --check — parko workspace
        # parko/Cargo.toml is a virtual manifest — cargo fmt needs --all there.
        run: cargo fmt --check --all --manifest-path parko/Cargo.toml
      - name: cargo fmt --check — detached harnesses
        run: |
          cargo fmt --check --manifest-path fuzz/Cargo.toml
          cargo fmt --check --manifest-path verification/kani/Cargo.toml
          cargo fmt --check --manifest-path crates/kirra-loom-models/Cargo.toml
          cargo fmt --check --manifest-path crates/kirra-verifier-pg/Cargo.toml
          cargo fmt --check --manifest-path tools/iceoryx2-spike/Cargo.toml
      - name: frozen-talisman blob pin survives formatting
        run: |
          pin=$(grep -oE '\bed00f4da[0-9a-f]{32}\b' docs/CAPTURE_PIPELINE_SPEC.md | head -1)
          actual=$(git hash-object crates/kirra-core/src/kinematics_contract.rs)
          test -n "$pin" && test "$actual" = "$pin" \
            || { echo "talisman blob $actual != pinned $pin"; exit 1; }

  # MSRV floor (policy §3). The number lives in THREE places bumped in
  # lock-step: the two [workspace.package] rust-version fields (root +
  # parko/Cargo.toml — every member inherits, #797 F3) and this lane's
  # toolchain pin.
  msrv:
    name: MSRV check (rustc 1.88)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.88.0"
      - name: cargo check on the MSRV floor — root workspace (locked)
        run: cargo +1.88.0 check --workspace --locked
      - name: cargo check on the MSRV floor — parko workspace (locked)
        # parko/ is a SEPARATE workspace with its own committed lockfile; policy
        # §3 requires BOTH lockfiles be verified on the MSRV floor.
        run: cargo +1.88.0 check --manifest-path parko/Cargo.toml --workspace --locked

  test:
    name: Test
    runs-on: ubuntu-latest
    # Job-level fast-fail guard so a hung run can't linger for hours holding
    # runners (the parko-onnx/openvino test STEPS already have their own
    # timeout-minutes; these are the previously-unbounded jobs).
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Run tests
        # --locked: build the committed Cargo.lock exactly; never re-resolve on
        # the runner (a fresh resolve pulls drifting transitives — see the
        # alloc-no-stdlib 2.x/3.x split that broke the brotli build).
        run: cargo test --workspace --locked
      - name: Fault injection tests (ISO 26262 safe-state verification — CERT-004)
        run: cargo test --test fault_injection --locked
      - name: kirra-core capture-feature tests (review M2 — feature-gated module)
        # The off-by-default `capture` module is only reached via feature
        # unification in the workspace run; test it on its own terms so it can
        # never silently rot if the unification path changes.
        run: cargo test -p kirra-core --features capture --locked

  miri:
    name: Miri — seqlock UB/memory-model check (EP-16)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Miri interprets the program against Rust's memory model, catching UB and
    # (with many seeds) weak-memory/data-race bugs the type system cannot. The
    # lane covers the Clause-2 CONTRACT PROTOCOL — the seqlock trust chain in
    # kirra-contract-channel, including the concurrent writer/reader torn-read
    # test (iteration count auto-scaled under cfg(miri)).
    #
    # kirra-hv-carrier is EXCLUDED, deliberately: Miri cannot interpret the
    # `shm_open`/`mmap` FFI its mapping needs ("can't call foreign function
    # `shm_open`"). Its unsafe budget is bounded + enumerated (ADR-0030 Clause
    # A), its AtomicView layout is compile-time-asserted against the frozen
    # contract, and its atomic ORDERINGS reproduce InProcessRegion's exactly —
    # which is what this lane Miri-checks. The mapping itself is exercised by
    # the cross-process tests in the inline-governor job.
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@efcb852328a9f50117170cc43094fb6f09eaf1ae # nightly
        with:
          components: miri
      - name: Contract-channel under Miri (lib + integration + doctests)
        run: cargo miri test -p kirra-contract-channel --locked
      - name: Seqlock writer/reader race under many seeds
        # -Zmiri-many-seeds re-runs the nondeterministic schedule with 16
        # different seeds, exploring distinct interleavings of the concurrent
        # torn-read test — the closest Miri gets to a schedule sweep.
        #
        # #1047 (CI-Honesty): the `concurrent` name FILTER matches zero tests if
        # the torn-read test is ever renamed, and libtest exits 0 on an empty
        # filter — so this seeded race sweep could pass VACUOUSLY. Fail hard if the
        # binary reports "running 0 tests" (a real Miri failure still reds via `||`).
        env:
          MIRIFLAGS: "-Zmiri-many-seeds=0..16"
        run: |
          set -uo pipefail
          out=$(cargo miri test -p kirra-contract-channel --lib --locked concurrent 2>&1) \
            || { echo "$out"; exit 1; }
          echo "$out"
          if echo "$out" | grep -q 'running 0 tests'; then
            echo "::error::miri 'concurrent' filter matched 0 tests — vacuous pass (test renamed?)."
            exit 1
          fi

  inline-governor:
    name: In-line governor loop (EP-01) — fault matrix + cross-process demo
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: FDIT fault matrix + cross-process release chain
        run: cargo test -p kirra-inline-governor --locked
      - name: Cross-process demo (scripted faults + INDICATIVE latency)
        run: cargo run --release -p kirra-inline-governor --bin inline_demo --locked
      - name: L3 end-to-end harness (host run; QNX-target run is the certified path)
        # The standing ADR-0030 incr.4 harness — verdict-correctness gate over
        # the same SHM carrier. Low iteration count: CI checks the GATE, not
        # the timing (host timing is INDICATIVE-only by construction).
        env:
          KIRRA_LAT_ITERS: "2000"
        run: cargo run --release -p kirra-l3-e2e --locked

  ha-two-process-drill:
    name: HA two-process failover drill (EP-02)
    runs-on: ubuntu-latest
    # One drill, real timers, generous boot budgets — its own SERIAL job so
    # port allocation and wall-clock timing never share a runner with the
    # parallel test sweep (the test itself is #[ignore] in `cargo test`).
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Run the drills (two kirra_verifier_service processes, one SQLite file; legacy + lease paths)
        # --test-threads 1: each drill spawns two service processes and measures
        # wall-clock failover; running them concurrently would contend the runner
        # and skew the timing assertions.
        run: cargo test --test ha_two_process_drill --locked -- --ignored --nocapture --test-threads 1
      - name: Generation restart drill (#791 F3 — no time-reversal across a real restart)
        # Same serial-process discipline: spawns the real binary twice against
        # one SQLite file and asserts the posture generation is seeded from the
        # persisted high-water (strictly newer after a SIGKILL restart).
        run: cargo test --test generation_restart_drill --locked -- --ignored --nocapture --test-threads 1

  docs-and-sdk:
    name: SDK docs + examples (G20)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: rustdoc build gate (public API docs; broken intra-doc links fail)
        # -D warnings turns any rustdoc warning (broken intra-doc link, unclosed
        # HTML tag, private-item link from public docs) into a hard error, so the
        # published SDK docs stay clean.
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps --lib --locked
      - name: Rust SDK example (governor_quickstart) builds + runs
        run: cargo run --example governor_quickstart --locked
      - name: C SDK example builds + runs against the cdylib
        # Compiles examples/c/kirra_ffi_demo.c against include/kirra.h + the
        # libkirra_verifier cdylib and runs it — keeps the C ABI examples from rotting.
        run: ./examples/c/build_and_run.sh

  safety-constants:
    name: Safety-constants provenance gate (EP-09)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Every VALIDATION-PENDING safety constant (RSS terms, redundancy
    # tolerances, CTRV bounds, VRU caps, …) is pinned in
    # ci/safety_constants_manifest.json with its provenance and sign-off
    # status. This job verifies the declared values still match the manifest —
    # a silent retune of a safety constant reds CI until the manifest is
    # re-signed alongside it. The RELEASE path runs the same script with
    # KIRRA_RELEASE_GATE=1, which additionally FAILS while any entry is still
    # `pending` — no placeholder can reach a release.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: declared constants match the signed manifest
        run: python3 ci/check_safety_constants.py
      - name: release gate refuses pending constants (red-path self-test)
        # Prove the release-blocking arm actually fires: with KIRRA_RELEASE_GATE=1
        # the script must exit non-zero exactly when a `pending` entry exists.
        # Once every constant is signed off this inverts automatically (release
        # mode passes and this step asserts that instead).
        run: |
          set -euo pipefail
          pending=$(python3 -c "import json; print(sum(1 for c in json.load(open('ci/safety_constants_manifest.json'))['constants'] if c['status'] == 'pending'))")
          if [ "$pending" -gt 0 ]; then
            if KIRRA_RELEASE_GATE=1 python3 ci/check_safety_constants.py; then
              echo "release gate FAILED TO BLOCK with $pending pending constants" >&2
              exit 1
            fi
            echo "release gate correctly blocks ($pending constants pending sign-off)"
          else
            KIRRA_RELEASE_GATE=1 python3 ci/check_safety_constants.py
            echo "all constants signed off — release gate green"
          fi

  checker-coverage:
    name: Checker decision coverage — gated floors (EP-07; true MC/DC toolchain-blocked, #65)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # The certification-relevant CHECKER crates get a GATED decision-coverage
    # floor (the workspace `coverage` job uploads but does not gate). Each crate
    # first attempts `--mcdc`: rustc currently rejects `-Zcoverage-options=mcdc`
    # (block|branch|condition only — the EP-07 spike result recorded in #65), so
    # the attempt falls back to BRANCH coverage (decision coverage — the
    # strongest gate the toolchain can express) and ci/check_decision_floor.py
    # gates on the strongest metric present in the export. The day nightly
    # restores mcdc, this lane upgrades itself with no workflow change.
    #
    # #1047 (CI-Honesty): the floors were RATCHETED UP toward the measured
    # branch coverage so a real regression can no longer merge green behind a
    # ~2-point cushion. Freshly measured (nightly `cargo llvm-cov --branch`):
    # kirra-trajectory 80.31 %, kirra-core 81.15 %, parko-core 77.78 %. Floors
    # keep only ~0.7-point anti-flake headroom under the two root-workspace
    # crates (79.5 / 80.5). parko-core's floor STAYS at 77.0: its true coverage
    # (77.78 %) is well under the STALE 79.82 % this comment used to cite — the
    # 77.0 floor already sits ~0.8 point under actual, so raising it would gate
    # on jitter. RATCHET up as coverage improves, never down without sign-off.
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@efcb852328a9f50117170cc43094fb6f09eaf1ae # nightly
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov
      - name: Gate the checker crates (root workspace)
        run: |
          set -euo pipefail
          gate () {
            local crate="$1" floor="$2"
            if cargo llvm-cov -p "$crate" --mcdc --json --summary-only > "cov-$crate.json" 2> "mcdc-$crate.err"; then
              echo "[$crate] MC/DC accepted by toolchain — gating on MC/DC."
            else
              echo "[$crate] --mcdc rejected by the toolchain (#65) — gating on branch (decision) coverage."
              cargo llvm-cov -p "$crate" --branch --json --summary-only > "cov-$crate.json"
            fi
            python3 ci/check_decision_floor.py "cov-$crate.json" "$floor" "$crate"
          }
          gate kirra-trajectory 79.5
          gate kirra-core 80.5
      - name: Gate parko-core (parko workspace)
        working-directory: parko
        run: |
          set -euo pipefail
          if cargo llvm-cov -p parko-core --mcdc --json --summary-only > cov-parko-core.json 2> mcdc.err; then
            echo "[parko-core] MC/DC accepted by toolchain — gating on MC/DC."
          else
            echo "[parko-core] --mcdc rejected by the toolchain (#65) — gating on branch (decision) coverage."
            cargo llvm-cov -p parko-core --branch --json --summary-only > cov-parko-core.json
          fi
          python3 ../ci/check_decision_floor.py cov-parko-core.json 77.0 parko-core

  coverage:
    name: Branch Coverage (workspace)
    runs-on: ubuntu-latest
    # Bumped 30→45: when --mcdc is unsupported the instrumented workspace test
    # suite runs TWICE (mcdc attempt, then branch fallback). Instrumented runs
    # carry 20–50% overhead, so a single 30-min budget could time out on the
    # double run and red the job falsely.
    timeout-minutes: 45
    # This lane REQUIRES nightly (`-Z coverage-options` for branch/MC-DC
    # instrumentation). The repo-root `rust-toolchain.toml` pin (1.94.1) would
    # otherwise override dtolnay's nightly default and every rustc spawn — even
    # cargo-llvm-cov's inner build-script compiles — would run on stable and
    # reject `-Z`. `RUSTUP_TOOLCHAIN` (env) outranks `rust-toolchain.toml` and is
    # inherited by all child processes, so it forces nightly job-wide.
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@efcb852328a9f50117170cc43094fb6f09eaf1ae # nightly
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov
      - name: Workspace branch coverage (attempts MC/DC, falls back — #65)
        # DECISION (EP-07 / issue #65): true MC/DC is TOOLCHAIN-BLOCKED — current
        # nightly rejects `-Zcoverage-options=mcdc` (only block|branch|condition
        # are accepted), so no Rust toolchain can express it today. This job stays
        # the WORKSPACE-WIDE branch gate (observability via Codecov); the GATED
        # decision-coverage floors for the certification-relevant checker crates
        # live in the dedicated `checker-coverage` job below, which attempts
        # `--mcdc` first every run so it auto-upgrades the day rustc restores it.
        #
        # The `if` swallows a non-zero `--mcdc` exit (set -e is suppressed in an
        # if-condition) and falls back; a genuine deterministic failure also fails
        # the branch run, so it still reds the job. The fallback rewrites the same
        # lcov.info, so the Codecov upload is unaffected either way.
        #
        # `--skip wcet_gate` excludes WCET timing assertions from the
        # instrumented run. llvm-cov instrumentation adds 20–50% overhead on
        # O(n) scans, which invalidates wall-clock budgets. The authoritative
        # WCET measurement runs in the dedicated `wcet-gate` job below on a
        # clean stable toolchain.
        run: |
          set -euo pipefail
          if cargo llvm-cov --workspace --mcdc \
            --ignore-filename-regex='/.cargo/registry' \
            --lcov --output-path lcov.info \
            -- --skip wcet_gate; then
            echo "MC/DC coverage completed."
          else
            echo "MC/DC unsupported on current nightly/tooling; falling back to branch coverage."
            cargo llvm-cov --workspace --branch \
              --ignore-filename-regex='/.cargo/registry' \
              --lcov --output-path lcov.info \
              -- --skip wcet_gate
          fi
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: lcov.info
          fail_ci_if_error: false

  # EP-10 (MGA G-9) — the live-Postgres storage-backend conformance lane. The
  # workspace-detached `crates/kirra-verifier-pg` binds the root crate's
  # `PgExecutor` / `EpochFence` / `NodeStore` seams to the sync `postgres`
  # client, and its tests run the SAME conformance suites the root crate runs
  # against SQLite (`assert_fence_contract` / `assert_node_store_contract`)
  # against a REAL server — plus PG-only drills (two-connection CAS race, the
  # migration engine's future-schema refusal, the `SELECT … FOR UPDATE`
  # actuator fence). Without `KIRRA_PG_URL` the tests skip vacuously; this lane
  # provides the server, so it is the lane that proves G-9's "second backend".
  postgres-conformance:
    name: Postgres backend conformance (EP-10, G-9)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # Gate the job's steps on a genuinely-accepting server (the container
        # can lag the job start by several seconds).
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Conformance suites vs live PostgreSQL 16
        # --locked: build the committed lockfile exactly; fail if it would drift.
        env:
          KIRRA_PG_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: cd crates/kirra-verifier-pg && cargo test --locked

  # M5 — loom concurrency-model tests. Exhaustively permutes thread interleavings
  # for the posture-generation protocol (`crates/kirra-loom-models`), proving the
  # "generations are unique / the cache never regresses" invariants hold under
  # every schedule. The crate is loom-detached from the workspace and compiles to
  # nothing without `--cfg loom`, so this is the only lane that exercises it.
  loom:
    name: Loom concurrency models (M5)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Run loom models (all interleavings)
        # --locked: build the committed lockfile exactly; fail if it would drift.
        run: cd crates/kirra-loom-models && RUSTFLAGS="--cfg loom" cargo test --release --locked

  # EP-15 — Kani model-checking proofs on the checker cores. Machine-checks the
  # `verification/kani/` harnesses: the HA lease split-brain algebra (all u64),
  # the frozen kinematics-contract fail-closed guards + P2 ceiling + Degraded
  # decel-to-stop denials (f64 is_finite case-split), and the RSS longitudinal
  # totality + the closing-speed monotonicity `occlusion_limited_speed`'s
  # bisection relies on (integer-scaled grids). The crate is workspace-detached
  # (like loom/fuzz) and `#[path]`-includes the shipped sources VERBATIM, so
  # the file under proof IS the file that ships.
  #
  # BLOCKING as of the L5 flip (proof runs on main were green and the proofs
  # are deterministic CBMC over blob-pinned sources): a genuine proof failure
  # now fails CI. The one tolerated failure mode is the Kani INSTALL step
  # (network/toolchain-fetch flake, `continue-on-error`) — when install fails
  # the proofs are SKIPPED, not failed, and the mirror tests of every property
  # (which need no Kani) have already run BLOCKING as this lane's first step,
  # so a property regression still fails CI even on an install-flake day.
  #
  # LANE SPLIT: harnesses behind the kani crate's `deep-proofs` feature (today:
  # R2 full-lattice monotonicity, whose exact-IEEE relational instance blew
  # this job's 45-min budget on both CaDiCaL and kissat) do NOT run here — the
  # default `cargo kani` below compiles them out. They run weekly with a
  # multi-hour budget in kani-deep-weekly.yml; their concrete mirrors still
  # run BLOCKING in this lane's first step.
  kani-proofs:
    name: Kani proofs (EP-15, blocking; install-flake tolerated)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Proof-property mirror tests (BLOCKING; includes compile + concrete mirrors)
        run: cd verification/kani && cargo test --locked
      - name: Install Kani (tolerated flake — proofs skip, mirrors already gated)
        id: kani-install
        continue-on-error: true
        run: cargo install kani-verifier --locked && cargo kani setup
      - name: Run Kani proofs (BLOCKING)
        if: steps.kani-install.outcome == 'success'
        run: cd verification/kani && cargo kani

  # M5 — fuzz-target build + bounded run guard. Compiles every cargo-fuzz
  # target in `fuzz/` against the current decoder APIs so the harnesses cannot
  # bitrot as the untrusted-input decoders evolve, then (WP-04 / MGA G-6) runs
  # each target for a BOUNDED 60 s so the fail-closed "never panic over the
  # byte space" properties are actually exercised on every PR — a regression
  # that a minute of libFuzzer finds is a regression a PR gate should catch.
  # Unbounded/scheduled deep fuzzing still belongs in dedicated infra; this is
  # the smoke tier. cargo-fuzz needs nightly, so `RUSTUP_TOOLCHAIN` forces it
  # past the `rust-toolchain.toml` pin (same pattern as the coverage lane).
  fuzz-build:
    name: Fuzz targets build + 60s run (M5)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@efcb852328a9f50117170cc43094fb6f09eaf1ae # nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Verify the fuzz workspace lockfile is up to date
        # `cargo fuzz build` does not accept `--locked` and would silently update a
        # stale fuzz/Cargo.lock. This resolves the detached fuzz workspace against
        # its committed lock WITHOUT building (no libFuzzer link), so a drifted
        # lockfile reds the lane deterministically before the build step.
        run: cargo metadata --manifest-path fuzz/Cargo.toml --locked --format-version 1 > /dev/null
      - name: Build all fuzz targets (bitrot guard)
        run: cargo fuzz build
      - name: Run each target 60s (smoke fuzz — any panic/crash reds the lane)
        # Targets enumerated from `cargo fuzz list` so a new target is picked up
        # automatically (adding a target without it being run is the silent-cap
        # failure mode this plan forbids). -max_total_time bounds wall clock;
        # a found crash artifact fails the step via cargo-fuzz's exit code.
        run: |
          set -euo pipefail
          for t in $(cargo fuzz list); do
            echo "::group::fuzz $t"
            cargo fuzz run "$t" -- -max_total_time=60 -rss_limit_mb=4096
            echo "::endgroup::"
          done

  # WP-08 (MGA G-6) — mutation gate on the CHECKER. Runs cargo-mutants ONLY
  # over the mutants lying in this PR's diff of the checker crate
  # (`--in-diff`): new/changed checker code must kill its own mutants, while
  # the pre-existing survivor debt (tracked + triaged in
  # docs/testing/MUTATION_BASELINE.md, ratcheted DOWN by targeted kill tests)
  # does not red unrelated PRs. A PR that does not touch the checker skips in
  # seconds. The test scope (checker + the adapter validation suite, where the
  # checker's deepest tests live) comes from .cargo/mutants.toml — measured on
  # the 2026-07-07 baseline, own-tests-only overstates survivors 318 vs 202.
  mutation-gate:
    name: Mutation gate (checker diff, WP-08)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Compute the PR's checker diff
        run: |
          set -euo pipefail
          git diff "origin/${{ github.base_ref }}"...HEAD -- \
            crates/kirra-trajectory/src > checker.diff
          wc -l checker.diff
      - name: Install cargo-mutants
        if: hashFiles('checker.diff') != ''
        run: |
          if [ -s checker.diff ]; then cargo install cargo-mutants --locked; fi
      - name: Mutants in the diff must be caught
        run: |
          set -euo pipefail
          if [ ! -s checker.diff ]; then
            echo "No checker changes in this PR — mutation gate not applicable."
            exit 0
          fi
          cargo mutants -p kirra-trajectory --in-diff checker.diff \
            --timeout 300 -j 1 --no-shuffle

  wcet-gate:
    name: WCET Gate (non-instrumented timing)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Run WCET gate tests
        # Authoritative WCET measurement. Runs on stable, non-instrumented,
        # without llvm-cov. The coverage job above skips these tests because
        # instrumentation overhead invalidates wall-clock thresholds. --release:
        # WCET is an OPTIMIZED-build property; the heavy containment guard asserts
        # ONLY when optimized (see wcet_gate.rs — a debug build's jitter-dominated
        # wall clock is not WCET), so this lane must build release to exercise it.
        #
        # #1047 (CI-Honesty): the `wcet_gate::ci_gate_tests` module FILTER matches
        # zero tests if the module is ever renamed — and libtest exits 0 on an
        # empty filter, so the gate would pass VACUOUSLY (green while asserting
        # nothing). Capture the run, echo it, and fail hard if the binary reports
        # "running 0 tests"; a genuine test failure still reds via the `||` arm.
        run: |
          set -uo pipefail
          out=$(cargo test -p kirra-verifier --lib wcet_gate::ci_gate_tests --release 2>&1) \
            || { echo "$out"; exit 1; }
          echo "$out"
          if echo "$out" | grep -q 'running 0 tests'; then
            echo "::error::wcet_gate::ci_gate_tests matched 0 tests — vacuous pass (module renamed?)."
            exit 1
          fi

  iceoryx2-spike:
    name: iceoryx2 carrier (frozen contract, isolated)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy
      - name: iceoryx2 frozen-contract carrier (full + minimal feature configs)
        # `tools/iceoryx2-spike` is its OWN workspace (own Cargo.lock, gitignored)
        # so the root `cargo test --workspace` never descends into it, and iceoryx2
        # never enters the SDK/parko dependency tree (the #275 isolation). Without
        # this lane the spike + the frozen-contract carrier (frozen.rs, which rides
        # the production GovernorContractView over iceoryx2 and validates with the
        # production validate()) compile/run for nobody — exactly how the upstream
        # iceoryx2 0.9.1->0.9.2 sub-crate skew silently broke the build. This lane
        # gates both the feature subset (#273) and the carrier (#275 / L2) on the
        # full AND minimal (--no-default-features) iceoryx2 configs, plus clippy.
        working-directory: tools/iceoryx2-spike
        run: |
          cargo test
          cargo test --no-default-features
          cargo clippy --all-targets -- -D warnings

  parko-safety:
    name: Parko Safety Tests (no ROS, no ORT)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Runtime-isolation guard (#146)
        working-directory: parko
        run: ci/check-runtime-isolation.sh
      - name: parko safety-critical tests
        # `parko/` is a separate workspace and the root `cargo test
        # --workspace` does NOT descend into it. Without this job the
        # ML-path safety tests (parko-core RSS + NaN failsafe,
        # parko-kirra H1 angular-velocity bound + GovernorComparator
        # divergence detection, parko-ros2 M2 MockBackend fail-closed
        # paths) compile as path deps but never RUN in CI — a
        # regression to e.g. the H1 angular cap would land on main with
        # CI green.
        #
        # This lane stays runtime-free by EXCLUDING every crate that dlopens a
        # native inference runtime at backend `::new` (libopenvino_c.so /
        # libonnxruntime.so) and panics without it — those tests belong to the
        # dedicated parko-onnx / parko-openvino jobs that install the runtimes.
        # The runtime-dependent backends are enumerated ONCE in
        # `ci/runtime-dependent-crates.txt` (the single source of truth) and the
        # `--exclude` flags below are derived from it. The preceding
        # "Runtime-isolation guard" step (#146, `ci/check-runtime-isolation.sh`)
        # FAILS this lane if a new ort/openvino/r2r-linked crate is added
        # without being listed — closing the drift hole that previously let
        # parko-openvino (added in e4df0fa) and parko-tensorrt run here
        # runtime-free without an exclude. Future runtime-FREE parko crates are
        # still picked up automatically by `--workspace`.
        working-directory: parko
        run: |
          EXCLUDES=$(grep -vE '^[[:space:]]*(#|$)' ci/runtime-dependent-crates.txt \
            | sed 's/^/--exclude /' | tr '\n' ' ')
          echo "Excluding runtime-dependent backends: $EXCLUDES"
          cargo test --workspace $EXCLUDES
      - name: parko feature-gated safety tests (required-features targets)
        # BLIND SPOT the workspace run above cannot see: `[[test]]` targets with
        # `required-features` are NOT built by `cargo test --workspace`, so they
        # silently rot — `test_posture_divergence` (test-helpers) stopped
        # compiling AND stopped asserting current #70/#770 semantics for months
        # with CI green. These features are dependency-free of any native
        # runtime (test-helpers is empty; verifier-sink pulls only the pure-Rust
        # SDK), so they run here in the runtime-free lane. Any NEW dependency-free
        # feature-gated safety target MUST be added to this list — a
        # runtime-DEPENDENT one belongs in the parko-onnx/openvino jobs instead.
        working-directory: parko
        run: |
          cargo test -p parko-core --features test-helpers
          cargo test -p parko-kirra --features verifier-sink

  parko-clippy:
    name: Parko Clippy (lint gate — no ROS, no ORT)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy
      - name: Clippy — parko workspace
        # `parko/` is a SEPARATE workspace: the root `static-analysis` Clippy lane
        # runs `cargo clippy --workspace` from the repo root, and `cargo clippy`
        # NEVER crosses a workspace boundary — so it does not descend into parko.
        # parko clippy debt was therefore caught by NO lane and silently
        # accumulated on main (the root lane runs only on PRs, and never over
        # parko at all). This lane closes that hole with the SAME invocation +
        # flags the root lane uses, over `--manifest-path parko/Cargo.toml`.
        #
        # Runtime-FREE (like `parko-safety`, but MORE so): clippy is a
        # compile-time check — it never dlopens the ONNX / OpenVINO / TensorRT
        # native runtimes that the parko-onnx/openvino/tensorrt tests load at
        # EXECUTION, so it can lint the whole graph (including those crates' test
        # targets) with no runtime installed, and needs no `--exclude` list.
        # Pinned toolchain (1.94.1) is inherited from rust-toolchain.toml exactly
        # as the root lane, so the lint set matches byte-for-byte.
        run: |
          cargo clippy --manifest-path parko/Cargo.toml --workspace --all-targets -- \
            -D warnings \
            -W clippy::all \
            -A clippy::module_name_repetitions \
            -A clippy::must_use_candidate \
            2>&1 | tee clippy-parko-report.txt

  parko-ros2-backends:
    name: Parko ros2 backend-selection lanes (build, no runtime)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: build the onnx + tensorrt backend-selection lanes
        # `parko_ros2::backend_select` compiles exactly ONE backend per feature
        # (mock / onnx / tensorrt), fail-closed, TensorRT taking precedence. The
        # module is NOT ros2-gated, so these lanes build fast with no ROS 2 and no
        # ORT runtime (load-dynamic). This compiles the backend_select MODULE; the
        # ros2 BINARY call site (main → select_backend → build_loop → warm_up) is
        # compiled by the `ros2-adapter-build` job (jazzy sourced) — together they
        # cover both halves. The mock lane is covered by the default-feature
        # workspace test in parko-safety.
        working-directory: parko
        run: |
          cargo build -p parko-ros2 --features onnx-backend
          cargo build -p parko-ros2 --features tensorrt-backend

  parko-onnx:
    name: Parko ONNX Backend Tests (ORT v1.23.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: Install ONNX Runtime v1.23.2
        # Exact version match: `ort 2.0.0-rc.11` (pinned in
        # parko-onnx/Cargo.toml) is compiled against ORT_API_VERSION = 23,
        # which requires ONNX Runtime v1.23.x. The matching minor is v1.23.2.
        #
        # Downgraded from rc.12 / ONNX Runtime 1.24.2 (#144): rc.12 DEADLOCKS
        # at OrtBackend::new in this CI environment even when fully serialized
        # (--test-threads=1: the first and only running test hung before
        # printing anything, then hit the 10-min timeout — a single-init
        # deadlock, not a concurrency race). rc.11 + ONNX Runtime 1.23.2 must
        # move in lockstep.
        run: |
          set -euo pipefail
          curl -L -o /tmp/onnxruntime-1.23.2.tgz \
            https://github.com/microsoft/onnxruntime/releases/download/v1.23.2/onnxruntime-linux-x64-1.23.2.tgz
          mkdir -p "$HOME/.local/onnxruntime"
          tar -xzf /tmp/onnxruntime-1.23.2.tgz \
            -C "$HOME/.local/onnxruntime" --strip-components=1
          test -f "$HOME/.local/onnxruntime/lib/libonnxruntime.so" \
            || (echo "libonnxruntime.so missing after install"; exit 1)
          # Export ORT_DYLIB_PATH here, in the shell, so $HOME expands
          # correctly. It must NOT be set as a step-level `env:` value using
          # ${{ env.HOME }} — the Actions expression `env` context does NOT
          # contain the runner's system HOME, so it expands to EMPTY and ort
          # then dlopens "/.local/.../libonnxruntime.so" and fails ("dlopen
          # failed"). That empty-HOME load failure is exactly what manifested
          # as the #144 "init deadlock" under rc.12 (whose dylib-load error
          # path deadlocks); rc.11 surfaces it as a clean panic.
          echo "ORT_DYLIB_PATH=$HOME/.local/onnxruntime/lib/libonnxruntime.so" >> "$GITHUB_ENV"
      - name: parko-onnx tests
        # ORT-dependent. If this job proves flaky in CI (network
        # download, ABI mismatch on a future Ubuntu image, etc.), it
        # MAY be flipped to `continue-on-error: true` so the safety
        # gate above continues to gate on its own — but the safety
        # gate must NEVER be made non-gating.
        #
        # FIX ATTEMPT for the #144 init deadlock: pin ort 2.0.0-rc.11 (ONNX
        # Runtime 1.23.2) instead of rc.12 (1.24.2). The surgical alternative
        # — serializing with --test-threads=1 — was REFUTED: the binary hung
        # at the very first OrtBackend::new with one thread, proving a genuine
        # single-init deadlock in the rc.12 + 1.24.2 pair rather than a
        # concurrent-init race. rc.11 added "immediate dylib loading with
        # error detection", so if it still can't initialize it should fail
        # fast instead of hanging. Cannot be validated outside CI (no ORT in
        # the authoring sandbox), so this is proven by the CI run itself.
        #
        # FAST-FAIL: `timeout-minutes` converts any residual hang into a fast,
        # visible failure WITHOUT making the job non-gating (no
        # continue-on-error — a real failure still blocks). A healthy
        # compile+run finishes well inside the budget. `--nocapture` +
        # backtrace surface the panic reason inline so a fast-failed run is
        # diagnosable (the captured "failures:" section never prints when the
        # binary hangs).
        timeout-minutes: 10
        working-directory: parko
        env:
          # ORT_DYLIB_PATH is exported from the install step via $GITHUB_ENV
          # (shell $HOME). It is intentionally NOT set here: a step-level
          # `env:` value would override the $GITHUB_ENV one, and the only way
          # to reference HOME in an Actions expression (${{ env.HOME }}) yields
          # an empty string → a "/.local/..." dlopen failure.
          RUST_BACKTRACE: "1"
          # STRICT: this is THE ORT-provisioned lane, so a would-be self-skip
          # (dylib missing/unloadable) is a hard failure here — the tests
          # self-skip everywhere else (the root --workspace lanes absorb
          # parko-onnx as an implicit member and install no ORT runtime).
          PARKO_ONNX_REQUIRE_ORT: "1"
        run: cargo test -p parko-onnx -- --nocapture

      - name: parko-tensorrt fail-closed test (PARK-021, GATING)
        # Reuses the CPU-only ONNX Runtime installed above (ORT_DYLIB_PATH from
        # $GITHUB_ENV). This build of ORT has NO TensorRT execution provider, so
        # registering the TRT EP (with `.error_on_failure()`) must make
        # TrtBackend::with_config return Err — proving the safety-critical
        # "no silent CPU fallback" on the very environment that lacks TensorRT.
        # The test self-skips only when the ORT lib FILE is absent (it is present
        # here), so it asserts in this job. Real TRT inference is Jetson-gated and
        # not run on CI; the TensorRTStubBackend remains the CI runtime fallback.
        timeout-minutes: 10
        working-directory: parko
        env:
          RUST_BACKTRACE: "1"
        run: cargo test -p parko-tensorrt --test fail_closed -- --nocapture

  parko-openvino:
    name: Parko OpenVINO Backend Tests (pip openvino-2025.1)
    runs-on: ubuntu-latest
    # This job is SPLIT into two test steps (see below), BOTH gating:
    #   1. OpenVINO-only tests — exercise OvBackend through the pip OpenVINO
    #      2025.1 wheel (#143 resolved by the wheel + bare-symlink install).
    #   2. Cross-backend equivalence test — exercises OrtBackend + OvBackend
    #      together. Was briefly non-gating while the apparent ort "init
    #      deadlock" (#144) was diagnosed as the empty-$HOME ORT_DYLIB_PATH
    #      bug; now fixed, so this step is gating again.
    # No continue-on-error anywhere in this job; `parko-safety` remains the
    # primary gating safety check.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Pin the toolchain to the repo's rust-toolchain.toml channel (1.94.1) WITH
      # its declared components (rustfmt, clippy) up-front — do NOT rely on the
      # bare `# stable` install. Otherwise the gating `cargo test` step (working
      # in `parko/`, which walks up to the 1.94.1 pin) triggers rustup to install
      # the ENTIRE 1.94.1 toolchain ON DEMAND mid-test; that path flaked with
      # "recovering from a partially installed toolchain … conflict: bin/cargo-clippy"
      # on a corrupted runner cache. Pre-installing the complete toolchain here
      # (matching the "Test" job's pinned pattern) means cargo finds everything
      # present and never takes the fragile on-demand-install path.
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.94.1"
          components: rustfmt, clippy
      - name: Install ONNX Runtime v1.23.2 (cross-backend equivalence test)
        # The OpenVINO test suite includes a cross-backend equivalence
        # test (`ort_ov_output_equivalence_on_mnist`) that loads the SAME
        # MNIST model through parko-onnx's `OrtBackend` and compares its
        # output to OpenVINO's. That backend dlopens libonnxruntime.so at
        # runtime (ort `load-dynamic`), so this job needs the ONNX runtime
        # too — identical install to the parko-onnx job (ort 2.0.0-rc.11 →
        # ONNX Runtime 1.23.2, kept in lockstep; see #144). Without it the
        # equivalence test panics ("Is libonnxruntime.so installed?").
        run: |
          set -euo pipefail
          curl -L -o /tmp/onnxruntime-1.23.2.tgz \
            https://github.com/microsoft/onnxruntime/releases/download/v1.23.2/onnxruntime-linux-x64-1.23.2.tgz
          mkdir -p "$HOME/.local/onnxruntime"
          tar -xzf /tmp/onnxruntime-1.23.2.tgz \
            -C "$HOME/.local/onnxruntime" --strip-components=1
          test -f "$HOME/.local/onnxruntime/lib/libonnxruntime.so" \
            || (echo "libonnxruntime.so missing after install"; exit 1)
          # Export ORT_DYLIB_PATH in the shell so $HOME expands (see the
          # parko-onnx job: a step-level ${{ env.HOME }} expands to empty and
          # breaks the dlopen). The cross-backend equivalence step below reads
          # it from $GITHUB_ENV.
          echo "ORT_DYLIB_PATH=$HOME/.local/onnxruntime/lib/libonnxruntime.so" >> "$GITHUB_ENV"
      - name: Install OpenVINO runtime (pip wheel, >= 2025.1)
        # openvino-rs REQUIRES OpenVINO >= 2025.1: `ov_element_type_e` changed
        # incompatibly in 2025.1, so the crate REJECTS older runtimes as "version
        # too old" (openvino-rs#167) to avoid silently creating wrong-type
        # tensors. That gate is PROTECTIVE — we SATISFY it (>= 2025.1), never
        # bypass it (no OPENVINO_SKIP_LINKING / force-accept).
        #
        # Why pip, not the apt package or the .tgz archive: the apt 2024.5 build
        # fails the gate, and storage.openvinotoolkit.org (the archive host) is an
        # S3 *website* endpoint that serves index.html for any path and only
        # cleanly exposes non-reproducible NIGHTLY builds — no pinnable GA URL
        # (proven across prior runs on this PR). The PyPI `openvino` wheel ships
        # the GA runtime (libopenvino_c.so + CPU plugin + TBB) — exactly what the
        # crate dlopens at OvBackend::new — and is exactly version-pinnable.
        #
        # A venv avoids PEP-668 "externally-managed-environment" on the runner's
        # system python.
        run: |
          set -euo pipefail
          python3 -m venv "$HOME/ovenv"
          "$HOME/ovenv/bin/pip" install --quiet --upgrade pip
          "$HOME/ovenv/bin/pip" install "openvino==2025.1.0"
          OV_PKG="$("$HOME/ovenv/bin/python" -c 'import openvino, os; print(os.path.dirname(openvino.__file__))')"
          echo "openvino package dir: ${OV_PKG}"
          # The wheel bundles native libs under openvino/libs (or a sibling
          # openvino.libs). Locate libopenvino_c.so* wherever it landed.
          LIB="$(find "${OV_PKG}" "${OV_PKG}.libs" -name 'libopenvino_c.so*' 2>/dev/null | head -n1 || true)"
          if [ -z "${LIB}" ]; then
            echo "::error::libopenvino_c.so not found in the openvino wheel (auditwheel may have hash-mangled the name)."
            echo "  ---- .so files in the wheel ----"
            find "${OV_PKG}" "${OV_PKG}.libs" -name '*.so*' 2>/dev/null | sort | head -60 || true
            exit 1
          fi
          OV_LIBDIR="$(dirname "${LIB}")"
          echo "OpenVINO runtime libs in: ${OV_LIBDIR}"
          ls -1 "${OV_LIBDIR}"/libopenvino_c.so*
          # The wheel ships only the versioned SONAME (e.g. libopenvino_c.so.2510)
          # with no bare dev symlink. openvino-finder matches the EXACT name
          # "libopenvino_c.so" when scanning LD_LIBRARY_PATH (it only does
          # version-suffix scanning for SYSTEM dirs, NOT LD_LIBRARY_PATH), so it
          # otherwise reports "Unable to find the openvino_c library". Create the
          # bare symlink; the dynamic linker still resolves the versioned deps
          # (libopenvino.so.X, plugins, libtbb) in this same dir via their SONAME.
          if [ ! -e "${OV_LIBDIR}/libopenvino_c.so" ]; then
            ln -s "$(basename "${LIB}")" "${OV_LIBDIR}/libopenvino_c.so"
            echo "Created bare symlink: libopenvino_c.so -> $(basename "${LIB}")"
          fi
          ls -l "${OV_LIBDIR}/libopenvino_c.so"
          # Per-step shells don't share env: expose the lib dir to the cargo step
          # via $GITHUB_ENV (openvino-finder probes LD_LIBRARY_PATH).
          echo "LD_LIBRARY_PATH=${OV_LIBDIR}${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}" >> "${GITHUB_ENV}"
      - name: parko-openvino OpenVINO-only tests (GATING)
        # The OpenVINO backend tests proper — they exercise OvBackend through
        # the pip-installed OpenVINO 2025.1 runtime and do NOT touch ort:
        #   - openvino_smoke_mnist_inference_runs_and_outputs_finite
        #   - openvino_descriptor_is_intel_openvino
        #   - openvino_capabilities_match_cpu_baseline
        #   - openvino_missing_model_returns_initialization_error_not_panic
        #   - equivalence_input_is_deterministic_and_in_unit_range (pure)
        # All confirmed green in CI once the pip wheel + bare-symlink install
        # landed. `--skip ort_ov_output_equivalence_on_mnist` excludes ONLY the
        # cross-backend test (run separately below) so the ort #144 deadlock
        # cannot infect this gating step. No continue-on-error: a real OpenVINO
        # regression now blocks. LD_LIBRARY_PATH comes from the install step via
        # $GITHUB_ENV (a step-level `env:` value would override it).
        timeout-minutes: 10
        working-directory: parko
        env:
          RUST_BACKTRACE: "1"
        run: cargo test -p parko-openvino -- --nocapture --skip ort_ov_output_equivalence_on_mnist
      - name: parko-openvino cross-backend equivalence test (GATING)
        # `ort_ov_output_equivalence_on_mnist` loads the SAME MNIST model
        # through parko-onnx's OrtBackend and compares it to OpenVINO's, so it
        # exercises BOTH runtimes together. It was previously isolated under
        # step-level continue-on-error while the apparent ort "init deadlock"
        # (#144) was diagnosed; that turned out to be the empty-$HOME
        # ORT_DYLIB_PATH bug, now fixed, and this test passes cleanly in CI
        # (rc.11 + ONNX Runtime 1.23.2). It is therefore GATING again — no
        # continue-on-error — so a real cross-backend divergence blocks.
        # `timeout-minutes` keeps a fast-fail guard. ORT_DYLIB_PATH (OrtBackend
        # load-dynamic) and LD_LIBRARY_PATH (OpenVINO) come from the install
        # steps via $GITHUB_ENV.
        timeout-minutes: 10
        working-directory: parko
        env:
          # ORT_DYLIB_PATH (for OrtBackend's load-dynamic) and LD_LIBRARY_PATH
          # (for OpenVINO) both come from the install steps via $GITHUB_ENV;
          # neither is set here, because a step-level `env:` value would
          # override $GITHUB_ENV and ${{ env.HOME }} expands to empty.
          RUST_BACKTRACE: "1"
        run: cargo test -p parko-openvino ort_ov_output_equivalence_on_mnist -- --nocapture


  static-analysis:
    name: Static Analysis (ISO 26262)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy
      - name: Quality guardrails (ratchet — line count / panic budget / ownership)
        # Pure-Python, no toolchain needed, so it runs first and fails fast/cheap.
        # Pins per-file line count, code-only panic/unwrap/expect counts, and the
        # State<Arc<AppState>> ownership rule (CLAUDE.md #11) to the recorded
        # baseline; only a regression past the ceiling fails. See
        # ci/check_quality_guardrails.py for the update protocol.
        #
        # `set -o pipefail` so the script's non-zero exit (a guardrail
        # regression) FAILS the job — without it the `tee` pipe returns tee's
        # exit code and masks the violation (mirrors the Dependency audit step).
        run: |
          set -o pipefail
          python3 ci/check_quality_guardrails.py | tee quality-guardrails-report.txt
      - name: Orphan-core gate (wire-or-delete ratchet, DD §8.2)
        # A crate-root `pub mod` with no non-test consumer must be wired,
        # deleted, or baselined with a justification — the forcing function
        # the DD review asked for after finding six unwired "DONE" cores.
        # See ci/check_orphan_cores.py + ci/orphan_cores_baseline.json.
        run: python3 ci/check_orphan_cores.py
      - name: Re-export shim ratchet (ADR-0035 shim deprecation, #1029)
        # The de-monolith left thin `pub use <lean-crate>` re-export shims in src/
        # for path back-compat. #1029 requires treating them as a DEPRECATION with
        # a removal milestone (v2.0.0), not a permanent layer. This ratchet freezes
        # the set: a NEW untracked shim fails (no silent indirection accretion), and
        # the count only moves DOWN. Self-test first (non-vacuity of the detector).
        # See ci/check_reexport_shims.py + ci/reexport_shims_baseline.json.
        run: |
          python3 ci/check_reexport_shims.py --self-test
          python3 ci/check_reexport_shims.py
      - name: Mick actuation fence (no path from the intent layer to the motors)
        # The doer-checker thesis, structurally: kirra-mick and the sidecar
        # binaries must have NO dependency route to the release-token mint,
        # the serial consumer, the ROS 2 node, or any serial/DDS/ROS external
        # crate — and no actuation seam tokens in their source. See
        # ci/check_mick_actuation_fence.py.
        run: python3 ci/check_mick_actuation_fence.py
      - name: Verdict-core purity fence (crypto separation + no_std kernel)
        # ADR-0031, structurally: the safety verdict is computed BEFORE signing,
        # so kirra-core + kirra-trajectory must have NO crypto (signing) edge,
        # and the QNX judge (kirra_judge.rs) must stay no_std / zero-alloc /
        # async-free / fs-free. A crypto edge in the verdict core would fold the
        # signing op into the verdict WCET and void the FTTI decomposition. The
        # self-test runs first (non-vacuity proof) so a broken fence can't pass
        # green. See ci/check_verdict_core_purity.py.
        run: |
          python3 ci/check_verdict_core_purity.py --self-test
          python3 ci/check_verdict_core_purity.py
      - name: Consumer FFI boundary smoke test (ADR-0033 Python↔Rust)
        # Proves the Yahboom X3 verifying-consumer boundary WITHOUT hardware:
        # loads libkirra_consumer_ffi via ctypes, mints frames with the governor
        # stand-in, and asserts the Rust core's decisions across the FFI
        # (valid+clamp / unsigned refuse / wrong-key alarm / replay / decel ramp)
        # — the same (a)/(b)/(c) the elevated first-run test checks, minus the
        # wheels. See robot/ffi_smoke_test.py + docs/hardware/ROSMASTER_X3_BRINGUP.md.
        run: |
          cargo build --locked -p kirra-consumer-ffi
          cargo build --locked -p kirra-release-token --bin kirra_ros_release_mint
          python3 robot/ffi_smoke_test.py
          # Teardown exactly-once guard (hardware first-run finding): stub-rclpy
          # harness drives the REAL publisher/consumer main() through the
          # signal-shutdown paths; an unguarded second rclpy.shutdown() fails it.
          python3 robot/teardown_smoke_test.py
          # R2 Path-B Ackermann last-hop (pure translation, no hardware): the
          # verify-gated set_car_motion swap becomes set_motor + AKM steering,
          # doing the Ackermann kinematics + measured calibration in our code.
          # Fail-closed calibration validation (no path starts on a guessed
          # profile), geometry/sign/clamps, MRC on non-finite/spin-in-place.
          # See robot/r2_drive.py + docs/hardware/R2_PATH_B_ACKERMANN_DRIVE.md.
          python3 robot/r2_drive_test.py
          # Rabbit voice logic (pure, no hardware): the {name} slot, the posture-
          # GATED boot greeting (only claims "governor nominal" on a fresh code-0
          # read; stale/degraded/lockout → "still checking myself over"), and the
          # OTA voice-matcher precedence. See docs/rabbit/RABBIT_VOICE_LINES.md.
          python3 robot/rabbit_voice_test.py
          # Wake-word logic (W1, pure, no audio/GPIO): phrase parsing, the
          # ordered-adjacent matcher with long-token-only edit tolerance
          # ("hallo rabbits" wakes, a stray "yo"/lookalike never does), the
          # RMS gate math, the fail-OPEN nap/mute state gate, and the
          # rabbit_wake control matcher incl. non-overlap with the OTA/diag/
          # drive matchers. See docs/hardware/RABBIT_AUDIO_STACK.md §3b.
          python3 robot/wake_word_test.py
          # ADR-0033 Tier-3 sentinel logic (#887, pure, no device): owner/mode
          # violations vs the AOU-ACTUATION-SERIAL-001 contract (the vendor
          # 0777 rule is the canonical hazard case), holder reporting, and the
          # fail-closed startup verdict incl. the loudly-labeled bring-up ack.
          python3 robot/serial_exclusivity_test.py
          # Diagnostics framework (pure, no hardware): schema v1 shape/ordering,
          # worst-of aggregation + exit codes, module isolation (raise/timeout →
          # UNKNOWN for that module only), the deterministic "run diagnostics"
          # voice matcher (no OTA/drive overlap), speech-summary capping, and
          # the voice-doctor wrapper against a stub. See docs/diagnostics.md.
          python3 robot/kirra_doctor_test.py
          # Detecting-installer contract (R2 golden build): detect/verify/install
          # are fail-closed (wrong car-type mode, unknown platform, missing
          # devices all refuse with remediation) and SELECT-NOT-INFER holds (the
          # rendered config carries names + mapping values, never a computed
          # safety parameter). See installer/ + docs/hardware/R2_GOLDEN_BUILD.md.
          python3 installer/test_installer.py
          # kirra_safety pure-decision suites (no ROS needed — the nodes'
          # fail-closed cores are deliberately rclpy-free): enforcement
          # decision, the A3 wheelbase cross-check, the ADR-0033 release-frame
          # carriage (strict 32/96 parse, never slice/pad), perception cap,
          # and the doer geometry + staleness-budget validation.
          python3 -m pip install --quiet pytest
          python3 -m pytest ros2_ws/src/kirra_safety/test/ -q
      - name: Install cargo-audit
        # `--locked` pins cargo-audit's OWN committed lockfile so a transitive dep
        # that later bumps its MSRV above our pinned toolchain (e.g. kstring 2.0.3
        # requiring rustc 1.96 while we pin 1.94) cannot break this install. Without
        # it cargo resolves deps to latest-compatible and the tool fails to build.
        run: cargo install cargo-audit --locked
      - name: Clippy
        # --all-targets lints tests/benches/examples too — test-code lint debt
        # had been slipping past the lib+bins-only default (review follow-up).
        run: |
          cargo clippy --workspace --all-targets -- \
            -D warnings \
            -W clippy::all \
            -A clippy::module_name_repetitions \
            -A clippy::must_use_candidate \
            2>&1 | tee clippy-report.txt
      - name: ShellCheck (shellcheck is preinstalled on the runner)
        # -S error: gate on real bugs, not style. The whole tracked script set is
        # error-clean today; a new error-level finding fails CI.
        run: |
          git ls-files -z -- '*.sh' | xargs -0 -r shellcheck -S error 2>&1 | tee shellcheck-report.txt
      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      - name: Lint the Helm chart
        # Default values (ClusterIP, ingress disabled) do NOT trip the H-1
        # fail-closed transport guards, so a clean chart lints green.
        run: helm lint helm/kirra 2>&1 | tee helm-lint-report.txt
      - name: Dependency audit
        # GATING (#687): `set -o pipefail` so `cargo audit`'s non-zero exit (a
        # RUSTSEC advisory against a workspace dependency) FAILS the job — the
        # `tee` pipe would otherwise return tee's exit code and mask it. Made
        # explicit so the gate does not depend on the runner's implicit bash
        # defaults or a future `shell:`/`defaults.run` override. The report is
        # still captured for the `if: always()` upload step below, so a failing
        # run still publishes the advisory details as an artifact. To accept a
        # specific advisory deliberately, add an ignore entry in `.cargo/audit.toml`
        # rather than removing this gate.
        run: |
          set -o pipefail
          cargo audit 2>&1 | tee audit-report.txt
      - name: Upload reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: static-analysis-reports
          path: |
            clippy-report.txt
            shellcheck-report.txt
            helm-lint-report.txt
            audit-report.txt
            quality-guardrails-report.txt

  parko-install-framework:
    name: Parko Multi-Backend Install Framework (shell, no hardware)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Framework self-test
        # Pure shell — no hardware, root, or network. Asserts the target-
        # parameterized installer's behavior: dispatch correctness, honest
        # vendor-SDK stub slots, fail-closed refusals (no silent backend
        # substitution), and non-skippable safety gates. On-silicon validation
        # per target is hardware-gated and NOT run here.
        run: bash scripts/test-install-parko-backend.sh

  ros2-adapter-build:
    name: ros2 adapter build (--features ros2)
    # DURABLE fix for the flaky ros2 build: run INSIDE the prebuilt
    # `ros:jazzy-ros-base` image instead of installing ROS via `setup-ros`.
    # setup-ros resolved the `ros2-apt-source` deb version with an UNAUTHENTICATED
    # api.github.com call (60/hr per shared runner IP); when it rate-limited the
    # version came back empty → the deb URL 404'd → `curl --fail` exited 22 → the
    # job died (and its apt install could also crawl a degraded mirror). The image
    # ships ROS + colcon + build-essential + git, so there is NO ROS apt install
    # at all — that whole failure mode simply cannot happen. The only extra
    # install is libclang for r2r's bindgen. (Jazzy = Ubuntu 24.04 Noble; the
    # image is Noble-based, so the toolchain matches.)
    runs-on: ubuntu-24.04
    container:
      image: ros:jazzy-ros-base
    timeout-minutes: 45
    defaults:
      run:
        # Force bash: a container's default `run` shell can be `sh`, where the
        # `source /opt/ros/jazzy/setup.bash` steps below (a bash builtin) fail.
        shell: bash
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install r2r build deps (libclang for bindgen)
        # ros:jazzy-ros-base already carries ROS, colcon, build-essential and git.
        # r2r's build script runs bindgen, which needs libclang; add it plus
        # curl/ca-certificates for the rustup installer the toolchain action uses.
        # colcon is (re)installed defensively — a no-op if already present. Runs as
        # root in the container (no sudo); apt hardening inline in case the Ubuntu
        # mirror is slow (this is the ONLY apt install left on the job).
        run: |
          printf 'Acquire::Retries "5";\nAcquire::http::Timeout "30";\nAcquire::https::Timeout "30";\nAcquire::ForceIPv4 "true";\n' \
            > /etc/apt/apt.conf.d/99-kirra-ci-mirror
          apt-get update
          apt-get install -y --no-install-recommends \
            clang libclang-dev curl ca-certificates python3-colcon-common-extensions
      - name: Build curated message workspace
        # Build ONLY the curated, integrator-pinned message packages the adapter
        # links against (autoware_perception_msgs + autoware_planning_msgs) — NOT
        # the full upstream autoware msgs, and NOT the rest of ros2_ws. This
        # reproduces the clean, curated-only environment so r2r doesn't
        # over-discover a stray full perception_msgs.
        #
        # `--packages-up-to` (vs a bare `colcon build`) deliberately EXCLUDES the
        # sibling C++ packages in ros2_ws/src — notably `kirra_bridge_cpp`, which
        # `#include "kirra.h"` (a generated cdylib FFI header not staged in this
        # msgs-only job) and therefore fails to compile, aborting the msgs builds
        # alongside it. The perception/planning msgs the adapter needs have no
        # workspace deps, so up-to == just these two here; the flag keeps it
        # correct if a curated dep is added later. The bridge's own build is a
        # separate concern, out of scope for this feature-compile gate.
        run: |
          source /opt/ros/jazzy/setup.bash
          cd ros2_ws
          colcon build --packages-up-to autoware_perception_msgs autoware_planning_msgs
      # Repo convention: dtolnay/rust-toolchain@stable (no rust-cache used).
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - name: cargo build -p kirra-ros2-adapter --features ros2
        # `cargo test --workspace` never compiles the ros2-gated code, so this is
        # the only CI step that does. A full `build` (not `check`) catches BOTH
        # failure classes from the original incident: the E0382 borrow-check break
        # (#198) AND the autoware_perception_msgs typesupport LINK error. Source
        # base jazzy + the curated ros2_ws/install so the link resolves cleanly.
        run: |
          source /opt/ros/jazzy/setup.bash
          source ros2_ws/install/setup.bash
          cargo build -p kirra-ros2-adapter --features ros2
      - name: cargo build parko-ros2 node binary (--features ros2 × backend lanes)
        # PARK-021 #2: the parko-ros2 node BINARY (main → select_backend →
        # build_loop → backend.warm_up) is r2r/ros2-gated, so neither
        # `cargo test --workspace` nor the distro-free `parko-ros2-backends` job
        # (which builds only the backend_select MODULE) ever compiles it. This is
        # the ONLY CI step that compiles those call sites — build (not check) the
        # binary on each PRODUCTION backend lane so the warm_up + fail-closed
        # backend-selection wiring cannot silently rot (evidence-drift guard).
        # parko-ros2 uses untyped r2r subscriptions, so base jazzy is enough (no
        # curated msgs workspace needed). ort `load-dynamic` compiles with no ORT
        # runtime present, so these are clean compile-only gates.
        #
        # working-directory: parko — parko-ros2 lives in the SEPARATE parko/
        # workspace; `-p parko-ros2 --features` from the repo root fails with
        # "cannot specify features for packages outside of workspace", so run from
        # the parko workspace root (mirrors the parko-ros2-backends job).
        working-directory: parko
        run: |
          source /opt/ros/jazzy/setup.bash
          cargo build -p parko-ros2 --bin parko_ros2_node --features ros2,onnx-backend
          cargo build -p parko-ros2 --bin parko_ros2_node --features ros2,tensorrt-backend

  # ── Kirra Console (Next.js operator console) ─────────────────────────────
  # Typecheck + production build + headless smoke: every route must render
  # with zero page errors (this is what catches React hydration regressions —
  # the class of bug fixed in the design-system port), the shell must compose
  # (#console-main present), and the quick-nav keyboard flow must navigate.
  # The smoke script self-manages the production server (scripts/smoke.mjs).
  console:
    name: Console typecheck + build + smoke (Next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: console
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install dependencies (locked)
        run: npm ci --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Production build
        run: npm run build
      - name: Install smoke browser
        run: npx playwright install --with-deps chromium
      - name: Smoke — all routes render clean, quick-nav navigates
        run: npm run smoke
