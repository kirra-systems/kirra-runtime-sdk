[package]
name = "parko-core"
version = "0.1.0"
edition = "2021"
# Workspace MSRV floor (WS-0.7, docs/VERSIONING_POLICY.md §3) — parko-core is
# the base crate every parko member depends on, so this bounds the workspace.
rust-version = "1.88"
description = "Core types and traits for vendor-neutral ML inference runtime"
repository = "https://github.com/kirra-systems/kirra-runtime-sdk"
license-file = "../../../COPYRIGHT"
publish = false  # proprietary (see COPYRIGHT) — not for crates.io

[features]
# Exposes test-only seams (e.g. set_state_for_test) to integration tests.
# Never enable in production builds. Release builds omit these symbols.
test-helpers = []

# Feature-gated zero-output stub backends for CI.
# Enable without hardware to verify the InferenceBackend contract compiles.
# Real implementations: PARK-021 (TensorRT), PARK-027 (QNN), PARK-028 (TIDL),
# PARK-029 (OpenVINO), PARK-030 (AMD).
backend-tensorrt = []
backend-qnn      = []
backend-tidl     = []
backend-openvino = []
backend-amd      = []

[dependencies]
serde = { version = "1.0", features = ["derive"] }
thiserror = "2.0"
tokio = { version = "1", features = ["sync", "time", "rt-multi-thread", "macros"] }

[dev-dependencies]
parko-kirra = { path = "../parko-kirra" }
proptest = "1"
# L5: serde JSON serialization test for the SDK-free audit records (the durable
# parko-kirra impl serializes these into JSON audit bodies; Serialize-only,
# matching the DivergenceEvent convention).
serde_json = "1"

[[test]]
name = "test_posture_divergence"
path = "tests/test_posture_divergence.rs"
required-features = ["test-helpers"]

[[test]]
name = "posture_divergence_proptest"
path = "tests/posture_divergence_proptest.rs"
