# parko/crates/parko-ros2/Cargo.toml
#
# M2 — Parko ROS 2 node. Brings Parko's end-to-end ML control path live
# in a ROS 2 deployment, parallel to the Occy adapter
# (`kirra-ros2-adapter`). See `docs/safety/PARKO_OCCY_TOPOLOGY.md`
# (KIRRA-OCCY-TOPOLOGY-001) for the parallel-paths decision.
#
# Layout follows the kirra-ros2-adapter convention:
#   - Default build = no ROS / no ORT deps. Pure logic that the unit
#     tests exercise via parko-core's MockBackend.
#   - `ros2` feature → r2r 0.9.5, tokio runtime hooks, the node binary.
#     The integrator turns this on alongside a sourced ROS 2 environment
#     and (for live ONNX inference) `ORT_DYLIB_PATH` pointing at a
#     local libonnxruntime.

[package]
name = "parko-ros2"
version = "0.1.0"
edition = "2021"
# MSRV floor inherited from the workspace root ([workspace.package]) — one
# source of truth per workspace, so `cargo <cmd> -p <member>` on an old
# toolchain fails the rust-version check up front, never mid-compile (#797 F3).
rust-version.workspace = true
description = "ROS 2 node for Parko's end-to-end ML control path (M2; parallel to kirra-ros2-adapter)"
repository = "https://github.com/kirra-systems/kirra-runtime-sdk"
license-file = "../../../COPYRIGHT"
publish = false  # proprietary (see COPYRIGHT) — not for crates.io

[features]
# Default = no ROS / no ORT. The state-machine + mapping tests run
# under the default lane via parko-core's MockBackend; the live r2r
# transport and ORT backend are feature-gated.
default = []

# Enable the r2r-backed node and the binary entry point. Requires a
# sourced ROS 2 environment (Humble/Jazzy/Kilted per r2r 0.9.5 support).
# Everything this lane touches is BASE-jazzy (sensor_msgs / std_msgs /
# nav_msgs / geometry_msgs, plus untyped subscriptions whose payload is a
# `serde_json::Value`), so no curated message workspace is needed.
ros2 = ["dep:r2r", "dep:tracing-subscriber", "dep:futures", "dep:serde_json"]

# Opt-in: the DEFERRED typed r2r radar adapter (`radar_scan_msg_to_detections`),
# which references `r2r::radar_msgs::msg::RadarScan`. `radar_msgs` is NOT a
# base-jazzy package, so this is gated OUT of the plain `ros2` lane (keeping that
# lane base-jazzy-only); enable it together with a ROS env that provides
# `radar_msgs` (e.g. `ros-jazzy-radar-msgs`) when the radar path is wired.
radar-ros2 = ["ros2"]

# Pull in parko-onnx (the production CPU backend). Optional so the
# default unit-test lane doesn't require libonnxruntime on the build
# host.
onnx-backend = ["dep:parko-onnx"]

# Pull in parko-tensorrt (the NVIDIA Jetson backend). Optional + load-dynamic,
# so it builds with no CUDA/TensorRT present (the EP is resolved at runtime,
# fail-closed). TensorRT takes precedence over onnx-backend when both are on
# (see backend_select). The on-Jetson install selects this via the installer's
# `--target tensorrt` (which builds with --features ros2,tensorrt-backend).
tensorrt-backend = ["dep:parko-tensorrt"]

[dependencies]
# Shared core (sensor model, scheduler, ControlCommand, SafetyGovernor
# trait, MockBackend).
parko-core  = { path = "../parko-core" }
# The dual-governor comparator that gates every command leaving the
# loop. This is the safety bridge: Parko produces commands, parko-kirra
# governs them, KirraGovernor enforces the same envelopes Occy uses.
parko-kirra = { path = "../parko-kirra", features = ["verifier-sink"] }
# The lean foundation (de-monolith Stage 5): FleetPosture + the shared PostureTracker
# state machine the node reads posture through — serde-only, no heavy tree.
kirra-core = { path = "../../../crates/kirra-core" }
# Taj Phase-A perception (ADR-0029 Phase 3b): LaserScan → ego-relative drivable
# corridor for the live SG2 containment gate. Lean — depends on kirra-core only
# (no ros2/tokio tree); Phase A is pure geometry, sim-testable with synthetic scans.
kirra-taj = { path = "../../../crates/kirra-taj" }
# Kept for the SQLite `VerifierStore` the clearance gate persists through (heavy,
# verifier-tier; see clearance_gate) — not on the governor hot path.
kirra-verifier = { path = "../../.." }
# ADR-0035 v2.0.0 shim removal: the clearance gate names `VerifierStore` from its
# canonical crate (the `kirra_verifier::verifier_store` re-export shim is gone).
kirra-persistence = { path = "../../../crates/kirra-persistence" }

# Async runtime. Default features so `tokio::spawn` and `mpsc` channels
# are available in both lanes (the scheduler already uses them).
tokio   = { version = "1", features = ["full"] }
tracing = "0.1"

# ROS 2 bindings — feature-gated, pinned per the r2r project's
# explicit no-API-stability stance. Same pin as the adapter.
r2r = { version = "=0.9.5", optional = true }

# Structured logging in the binary. Optional + gated on ros2 since
# only the binary needs a subscriber.
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"], optional = true }

# futures Stream / StreamExt for consuming r2r's untyped subscription
# streams in the drain tasks. Same pattern as the adapter.
futures = { version = "0.3", optional = true }

# r2r's untyped subscriptions/publishers exchange `serde_json::Value`; the node
# builds the geometry_msgs/Twist envelope with `json!`. ros2-only (the default
# unit-test lane has no r2r and never touches it), hence optional + the feature.
serde_json = { version = "1", optional = true }

# Optional ONNX backend. The integrator opts in when ORT is installed.
parko-onnx = { path = "../parko-onnx", optional = true }

# Optional TensorRT (Jetson) backend. load-dynamic, so building it needs no
# CUDA/TRT libs; the EP is resolved against the dlopened ORT at runtime.
parko-tensorrt = { path = "../parko-tensorrt", optional = true }

[dev-dependencies]
# State-machine tests use parko-core's MockBackend (no ORT, no ROS).
tokio = { version = "1", features = ["full", "test-util", "macros"] }
# Property tests for the pure sensor mappings (quality-hardening pass).
proptest = "1"

# The node binary is feature-gated to `ros2`; the default cargo build
# does not see this entry.
[[bin]]
name = "parko_ros2_node"
path = "src/bin/parko_ros2_node.rs"
required-features = ["ros2"]
