[package]
name = "parko-onnx"
version = "0.1.0"
edition = "2021"
description = "ONNX Runtime backend for parko-core via ort"
repository = "https://github.com/kirra-systems/kirra-runtime-sdk"
license-file = "../../../COPYRIGHT"
publish = false  # proprietary (see COPYRIGHT) — not for crates.io

[features]
# CUDA execution provider (NVIDIA GPU). Enables ort's `cuda` feature, which
# compiles in the CUDA EP bindings. The DEFAULT build is CPU-only and pulls NO
# CUDA libraries: `ort/cuda` -> `ort-sys/cuda` is an empty marker feature, and
# `load-dynamic` (always on) sets `ort-sys/disable-linking`, so nothing CUDA is
# LINKED at build time — `cargo build --features cuda` compiles with no CUDA/GPU
# present. Real CUDA inference needs a CUDA-enabled ONNX Runtime + GPU at RUNTIME
# (the gated tests run only in a dedicated GPU CI job — see tests/, #144 pattern).
cuda = ["ort/cuda"]

[dependencies]
parko-core = { path = "../parko-core" }
# ort 2.0.0-rc.11 (ONNX Runtime 1.23.2, ORT_API_VERSION = 23). Downgraded
# from rc.12 (ONNX Runtime 1.24.x): rc.12 DEADLOCKS at OrtBackend::new in CI
# even single-threaded (one test, --test-threads=1, hangs before any output)
# — see #144. rc.11 added "immediate dylib loading with error detection" and
# is the next-newest release; the ci.yml ONNX Runtime install is pinned to the
# matching 1.23.2 in lockstep.
#
# The `=` is REQUIRED, not stylistic: a caret requirement ("2.0.0-rc.11")
# matches any *higher* pre-release of the same 2.0.0 (Cargo pre-release
# semantics), so it silently resolves back to rc.12 on a fresh CI checkout
# (parko/Cargo.lock is gitignored). `=2.0.0-rc.11` forces exactly rc.11.
ort = { version = "=2.0.0-rc.11", features = ["load-dynamic"] }
# Structured logging of the execution posture (thread count + reproducibility)
# at backend init — mirrors the parko-ros2 tracing style.
tracing = "0.1"
