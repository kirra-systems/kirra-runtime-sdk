# EP-10 (MGA G-9) — the LIVE Postgres backend for the verifier storage seams.
#
# The root crate ships the dialect-agnostic pieces: the migration engine
# (`verifier_store::migrations` / `migrations_postgres::PostgresBackend` over the
# injected `PgExecutor` seam) and the two storage-contract traits (`EpochFence`,
# `NodeStore`) with their shared conformance suites. This crate binds those seams
# to a REAL server via the sync `postgres` client — the "~10-line adapter" the
# seam documentation promises — and its tests run the SAME conformance suites
# against a live `services: postgres` container in the dedicated CI lane
# (`postgres-conformance`), upgrading G-9 from "seams" to "second backend,
# proven".
#
# The empty `[workspace]` table detaches this crate from the parent workspace
# (like `crates/kirra-loom-models/` and `fuzz/`): the `postgres` driver tree
# (tokio, etc.) never enters the root Cargo.lock, the MSRV lane, or a normal
# `cargo build --workspace`. Tests SKIP (pass vacuously, loudly) when
# `KIRRA_PG_URL` is unset, so a local `cargo test` here without a server is
# green; the CI lane provides the server and sets the URL.
[package]
name = "kirra-verifier-pg"
version = "0.1.0"
edition = "2021"
description = "Live Postgres backend for the kirra-verifier storage seams (EpochFence / NodeStore / schema migrations) — conformance-proven against a real server in CI."
repository = "https://github.com/kirra-systems/kirra-runtime-sdk"
license-file = "../../COPYRIGHT"
publish = false # proprietary (see COPYRIGHT) — not for crates.io

# Detach from the parent workspace (own lockfile, own CI lane).
[workspace]

[dependencies]
kirra-verifier = { path = "../.." }
# The sync client the program names ("the promised ~10-line PgExecutor adapter
# over `postgres` (sync)"). Bundled TLS is NOT needed — the CI service container
# is plaintext-local; an integrator terminating TLS binds their own connector.
postgres = "0.19"
# The `nodes.status_json` column round-trips `NodeTrustState` exactly as the
# SQLite backend does (same serde encoding, same Unknown fallback on corrupt).
serde_json = "1"
# The FabricAssetStore seam names `FabricAsset` directly (its enum fields +
# metadata map are JSON-serialized into TEXT columns, exactly as SQLite). Already
# transitive via kirra-verifier; declared direct so the impl can name the type.
kirra-fabric-types = { path = "../kirra-fabric-types" }
# The OtaCampaignStore seam names `Campaign` / `NodeArtifactStatus` (+ the
# `CampaignState` / `HaltReason` enums for state-token encoding) directly. Already
# transitive via kirra-verifier; declared direct so the impl can name the types.
kirra-ota-campaign = { path = "../kirra-ota-campaign" }
