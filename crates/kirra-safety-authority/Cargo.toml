# crates/kirra-safety-authority/Cargo.toml
#
# ADR-0035 Stage 3 (slice 3a ‚Äî the leading edge) ‚Äî the first extraction toward a
# `SafetyAuthority` crate that will eventually own the posture engine + gray/black
# DAG + actuator gate + attestation lifted off the `AppState` god-object.
#
# This FIRST slice moves only the PURE, AppState-free safety-DECISION surface, to
# prove the crate/shim/MSRV/guardrail mechanics before anything touches the DAG or
# actuator core (see the Stage-3 risk register):
#   - `FleetNodePosture`      ‚Äî the per-node posture record the DAG emits
#   - `derive_fleet_posture`  ‚Äî the pure fleet-fold (LockedOut > Degraded > Nominal)
#   - `RssRecoveryStreak`     ‚Äî the in-memory RSS recovery streak counter
#   - `LockoutReason`         ‚Äî the structured fail-closed reason codes
#
# `kirra-verifier` depends on this crate and RE-EXPORTS it (each original location
# keeps a `pub use kirra_safety_authority::‚Ä¶` shim) so every existing
# `crate::verifier::FleetNodePosture` / `crate::posture_engine::derive_fleet_posture`
# / `crate::posture_engine_v2::LockoutReason` path resolves unchanged. No consumer
# is edited in this slice.
[package]
name = "kirra-safety-authority"
version = "0.1.0"
edition = "2021"
description = "Kirra safety-authority core (ADR-0035 Stage 3) ‚Äî the pure, AppState-free posture-decision surface: FleetNodePosture, the fleet-fold, the RSS recovery streak, and the fail-closed LockoutReason codes. No service/DB deps."
repository = "https://github.com/kirra-systems/kirra-runtime-sdk"
license-file = "../../COPYRIGHT"
publish = false # proprietary (see COPYRIGHT) ‚Äî not for crates.io

[dependencies]
# FleetPosture + NodeTrustState (the posture record's fields, and the fleet-fold's
# lattice) + RegisteredNode (the DAG's node registry value) live in the foundation.
kirra-core = { path = "../kirra-core" }
# The gray/black DAG traversal (slice 3d) reads the node/edge maps directly; they
# are `DashMap`s on `AppState`, passed by reference into the pure traversal.
dashmap = "6"
# The posture record + reason codes serialize exactly as they did in the root
# (SSE payloads, verdict bodies) ‚Äî same derives, byte-identical. The `rc` feature
# is REQUIRED: `FleetNodePosture` interns its ids as `Arc<str>` (review P5), and
# serde only implements `Serialize`/`Deserialize` for `Arc`/`Rc` under `rc`.
serde = { version = "1", features = ["derive", "rc"] }

# --- Stage 3b: the attestation module's crypto (issue #73) ---
# Ed25519 verify + SPKI/DER public-key parsing (`pkcs8` feature) ‚Äî the vetted
# primitive the whole repo's attestation/federation path uses.
ed25519-dalek = { version = "2", features = ["rand_core", "pkcs8"] }
# hex-decoding the presented signature proof.
hex = "0.4"
# `verifying_key_id` + `parse_ed25519_public_pem` ‚Äî the shared key-id/PEM helpers
# already extracted to the audit-hash leaf crate (slice 2).
kirra-audit-hash = { path = "../kirra-audit-hash" }

[dev-dependencies]
# The attestation test suite: SPKI round-trip (base64), the legacy-HMAC-proof
# rejection test (hmac/sha2), and the property tests (proptest).
base64 = "0.22"
hmac = "0.13"
sha2 = "0.11"
proptest = "1"
