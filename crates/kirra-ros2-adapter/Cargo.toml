# crates/kirra-ros2-adapter/Cargo.toml
#
# S131 Phase 1 — Option-B per-trajectory wiring adapter (skeleton).
#
# Owns the ROS 2 ↔ Rust bridge for the Kirra Governor. Built as a separate
# crate so the safety kernel (`kirra-runtime-sdk`) stays free of ROS deps
# and can ship on platforms that don't carry rclpy / ros-base. Production
# integrators that DO run ROS 2 (e.g. Autoware) enable the `ros2` feature
# here and link this crate into their node graph.
#
# Current state (the Option-B wiring is LIVE; this header began as a Phase-1
# skeleton note and is updated to match reality):
#   - This crate depends ONLY on the lean `kirra-core` for safety logic
#     (de-monolith Stage 7); the heavy `kirra-runtime-sdk` verifier service is
#     no longer a dependency.
#   - The slow loop CALLS `validate_trajectory_containment` per accepted
#     trajectory at `src/validation.rs:161` (from
#     `kirra_core::containment`). SG2 is ENFORCED via this
#     Option-B wiring (#131; see `docs/safety/TRACEABILITY_MATRIX.md`).
#   - Phase 1 originally stubbed both (own shared types, no containment call);
#     wired since #131.
#
# Crate shape: `AcceptedTrajectory` state machine + `AdaptorState` (DashMap),
# `CorridorSource` trait + `MockCorridorSource` (5 m half-width corridor),
# r2r-backed `run_adapter` node feeding slow- and fast-loop tasks.
#
# r2r is pinned (=0.9.5) because the project explicitly states "the API will
# change". Bumping is a deliberate maintenance action, not a transitive ride.

[package]
name = "kirra-ros2-adapter"
version = "0.1.0"
edition = "2021"
description = "ROS 2 adapter for the Kirra Governor (Option-B per-trajectory wiring, S131 Phase 1)"
repository = "https://github.com/kirra-systems/kirra-runtime-sdk"
license-file = "../../COPYRIGHT"
publish = false  # proprietary (see COPYRIGHT) — not for crates.io

[features]
# Default build = no ROS deps. Enables the state machine + corridor trait
# only, which is what the rest of the workspace consumes today.
default = []

# Enable r2r + the ROS 2 node skeleton in src/node.rs (the perception-
# governance path: subscribes autoware_perception_msgs/PredictedObjects,
# parses + validates + composes the Track-C derate). ROS distros:
# Humble / Jazzy / Kilted (per r2r 0.9.5 support matrix). Production
# integrators turn this on; the safety kernel CI keeps it OFF. Requires only
# a sourced ROS 2 + autoware_perception_msgs on AMENT_PREFIX_PATH:
#   source /opt/ros/jazzy/setup.bash
# This feature pulls NO C++ / no cxx / no lanelet2 — that is the separate
# `lanelet2` feature below (the perception governance path is independent of
# the map/corridor layer). See README.
ros2 = ["dep:r2r", "dep:tracing-subscriber", "dep:futures", "dep:reqwest", "dep:serde_json", "dep:bytes", "kirra-core/capture"]

# Enable the real Lanelet2CorridorSource — a cxx/C++ wrap of `lanelet2_core`'s
# boost::serialization deserializer (`fromBinMsg`). Implies `ros2` (the only
# consumer of Lanelet2CorridorSource is the node binary, which needs r2r).
# Production / map-aware build. Requires the C++ toolchain prerequisites:
#   apt install ros-${ROS_DISTRO}-lanelet2 libboost-serialization-dev libeigen3-dev
# (or the integrator's equivalents) — see README. The lanelet2 C++ API/version
# compatibility is the concern of THIS feature only; a plain `ros2` build never
# compiles the C++ bridge.
lanelet2 = ["ros2", "dep:cxx", "dep:cxx-build"]

[dependencies]
# Concurrency primitives shared with the safety kernel.
dashmap = "6"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"

# Lean foundation — the corridor seam (`Point`/`CorridorSource`/`MockCorridorSource`)
# and the trajectory/perception data types (`Pose`/`TrajectoryPoint`/`TrajectoryVerdict`/
# `PerceivedObject`) live here (de-monolith Stage 6a), so the shared lane map and the
# planner build on them without the heavy adapter. serde-only, no ROS/async.
# Lean foundation — now the adapter's ONLY safety dependency (de-monolith Stage 7).
# Everything the adapter needs lives here: the corridor seam + trajectory/perception data
# types (Stage 6a), the SG2 containment checker (`validate_trajectory_containment`) and the
# kinematics-contract talisman (`validate_vehicle_command`), the `PostureTracker`, the
# Track-C `perception_monitor`, the `kinematics_sim` integrator, and (behind the `capture`
# feature, enabled by `ros2` below) the learning-loop capture builders + writer. The heavy
# `kirra-runtime-sdk` (axum/rusqlite/reqwest verifier service) is NO LONGER a dependency —
# this severs the adapter→SDK edge and, transitively, the planner's last SDK pull.
kirra-core        = { path = "../kirra-core" }
parko-core        = { path = "../../parko/crates/parko-core" }

# ROS 2 bindings — feature-gated. Pinned (`=`) because r2r explicitly does
# not guarantee API stability; a deliberate bump is a separate maintenance
# action. Runtime-agnostic + async-from-the-ground-up.
r2r = { version = "=0.9.5", optional = true }

# cxx — Rust ↔ C++ FFI bridge. Used by `Lanelet2CorridorSource` to call
# into `lanelet2_core`'s boost::serialization deserializer (`fromBinMsg`
# canonical path). Pinned to 1.0 to match cxx-build (build-deps below).
# Gated on the `lanelet2` feature (NOT `ros2`): only the corridor bridge
# needs C++ FFI; the perception path pulls no cxx.
cxx = { version = "1.0", optional = true }

# Phase 4: structured logging in the adapter binary. Optional + gated on
# the ros2 feature because only the binary uses it (the library uses
# `tracing` directly without a subscriber).
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"], optional = true }

# Phase 4: futures Stream / StreamExt for consuming r2r's untyped
# subscription streams in the subscription-stamping tasks. r2r itself
# pulls this in transitively at the same major version; depending on it
# explicitly pins our usage. Gated on `ros2` since only the node code
# touches r2r streams.
futures = { version = "0.3", optional = true }

# M1b — SSE client for the verifier's /system/posture/stream endpoint.
# `reqwest` is already a workspace-wide dep (via the kernel's
# kirra_carla_client); the adapter binary uses its streaming API to pump
# posture events into `PostureTracker`. Gated on `ros2` because the
# transport only matters when the binary is built.
reqwest    = { version = "0.12", default-features = false, features = ["rustls-tls", "stream"], optional = true }
serde_json = { version = "1",    optional = true }
bytes      = { version = "1",    optional = true }

[build-dependencies]
# cxx-build — compiles the C++ shim and the cxx-generated glue. Must
# match the `cxx` major version pinned above. Skipped unless the `lanelet2`
# feature is ON: `build.rs` is a no-op for default and `ros2`-only builds.
cxx-build = { version = "1.0", optional = true }

[dev-dependencies]
# State-machine tests don't need the ros2 feature.
tokio = { version = "1", features = ["full", "test-util"] }

# Phase 4: the adapter node binary. Feature-gated to `ros2`; the default
# cargo build does not see this entry. `tracing-subscriber` is only
# referenced from the binary's `init_tracing()`, so it's a feature-gated
# dev-style dep folded into the optional set.
[[bin]]
name = "kirra_ros2_adapter_node"
path = "src/bin/kirra_ros2_adapter_node.rs"
required-features = ["ros2"]
