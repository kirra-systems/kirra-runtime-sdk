# crates/kirra-ros2-adapter/Cargo.toml
#
# S131 Phase 1 — Option-B per-trajectory wiring adapter (skeleton).
#
# Owns the ROS 2 ↔ Rust bridge for the Kirra Governor. Built as a separate
# crate so the safety kernel (`kirra-runtime-sdk`) stays free of ROS deps
# and can ship on platforms that don't carry rclpy / ros-base. Production
# integrators that DO run ROS 2 (e.g. Autoware) enable the `ros2` feature
# here and link this crate into their node graph.
#
# Phase 1 scope (this crate, this commit):
#   - AcceptedTrajectory state machine + `AdaptorState` (DashMap-backed).
#   - `CorridorSource` trait + `MockCorridorSource` (5 m half-width corridor).
#   - r2r-backed `run_adapter` node skeleton with stubbed subscriptions
#     and internal mpsc channels feeding slow- and fast-loop task stubs.
#   - NO call into `validate_trajectory_containment` yet — Phase 2 wiring.
#   - NO kirra-runtime-sdk dep yet — Phase 1 owns its own shared types.
#
# r2r is pinned (=0.9.5) because the project explicitly states "the API will
# change". Bumping is a deliberate maintenance action, not a transitive ride.

[package]
name = "kirra-ros2-adapter"
version = "0.1.0"
edition = "2021"
description = "ROS 2 adapter for the Kirra Governor (Option-B per-trajectory wiring, S131 Phase 1)"
license = "Apache-2.0 OR MIT"

[features]
# Default build = no ROS deps. Enables the state machine + corridor trait
# only, which is what the rest of the workspace consumes today.
default = []

# Enable r2r + the ROS 2 node skeleton in src/node.rs. ROS distros: Humble
# / Jazzy / Kilted (per r2r 0.9.5 support matrix). Production integrators
# turn this on; the safety kernel CI keeps it OFF.
ros2 = ["dep:r2r"]

[dependencies]
# Concurrency primitives shared with the safety kernel.
dashmap = "6"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"

# ROS 2 bindings — feature-gated. Pinned (`=`) because r2r explicitly does
# not guarantee API stability; a deliberate bump is a separate maintenance
# action. Runtime-agnostic + async-from-the-ground-up.
r2r = { version = "=0.9.5", optional = true }

[dev-dependencies]
# State-machine tests don't need the ros2 feature.
tokio = { version = "1", features = ["full", "test-util"] }
